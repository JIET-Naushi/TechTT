<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — JIET Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card" style="max-width:420px;">
    <div class="login-logo">
      <div style="font-size:2.4rem;">🔑</div>
      <h2>Reset Password</h2>
    </div>

    <div id="alertBox"></div>

    <!-- Checking token validity -->
    <div id="checkingArea" style="text-align:center;padding:20px 0;">
      <div class="spinner" style="width:32px;height:32px;border-color:#e8eaf6;border-top-color:#1a237e;margin:0 auto 12px;"></div>
      <p style="color:#777;font-size:0.88rem;">Validating reset link…</p>
    </div>

    <!-- Token invalid -->
    <div id="invalidArea" style="display:none;text-align:center;">
      <div style="font-size:3rem;margin-bottom:12px;">❌</div>
      <h3 style="color:#c62828;margin-bottom:8px;">Link Expired or Invalid</h3>
      <p style="color:#555;font-size:0.88rem;">This reset link has already been used or has expired (links are valid for 1 hour).</p>
      <a href="/forgot-password.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex;">Request a New Link</a>
    </div>

    <!-- Reset form -->
    <div id="formArea" style="display:none;">
      <div class="form-group">
        <label>New Password <span style="color:#c62828;">*</span></label>
        <input type="password" id="newPassword" class="form-control" placeholder="At least 6 characters" autofocus>
      </div>
      <div class="form-group">
        <label>Confirm New Password <span style="color:#c62828;">*</span></label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat new password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" id="resetBtn" onclick="doReset()">
        🔑 Set New Password
      </button>
    </div>

    <!-- Success -->
    <div id="successArea" style="display:none;text-align:center;">
      <div style="font-size:3rem;margin-bottom:12px;">✅</div>
      <h3 style="color:#2e7d32;margin-bottom:8px;">Password Updated!</h3>
      <p style="color:#555;font-size:0.88rem;">Your password has been changed successfully.</p>
      <a href="/login.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex;">Go to Login</a>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="/login.html" style="color:#666;font-size:0.85rem;">← Back to Login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token  = params.get('token');

    async function validateToken() {
      if (!token) { showInvalid(); return; }
      try {
        const res  = await fetch(`/api/auth/reset-password/validate?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        document.getElementById('checkingArea').style.display = 'none';
        if (data.valid) {
          document.getElementById('formArea').style.display = 'block';
          // Show expiry countdown
          if (data.expires_at) {
            const exp  = new Date(data.expires_at);
            const mins = Math.max(0, Math.round((exp - Date.now()) / 60000));
            document.getElementById('alertBox').innerHTML =
              `<div class="alert alert-info" style="font-size:0.82rem;">⏱ This link expires in ~${mins} minute${mins !== 1 ? 's' : ''}.</div>`;
          }
        } else {
          showInvalid();
        }
      } catch {
        showInvalid();
      }
    }

    function showInvalid() {
      document.getElementById('checkingArea').style.display = 'none';
      document.getElementById('invalidArea').style.display  = 'block';
    }

    async function doReset() {
      const newPwd  = document.getElementById('newPassword').value;
      const confPwd = document.getElementById('confirmPassword').value;
      const alertBox = document.getElementById('alertBox');
      const btn = document.getElementById('resetBtn');

      alertBox.innerHTML = '';

      if (!newPwd) {
        alertBox.innerHTML = '<div class="alert alert-error">Please enter a new password.</div>'; return;
      }
      if (newPwd.length < 6) {
        alertBox.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>'; return;
      }
      if (newPwd !== confPwd) {
        alertBox.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>'; return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPwd })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          document.getElementById('formArea').style.display   = 'none';
          document.getElementById('successArea').style.display = 'block';
          document.getElementById('alertBox').innerHTML = '';
        } else {
          alertBox.innerHTML = `<div class="alert alert-error">${data.message || 'Reset failed. The link may have expired.'}</div>`;
          btn.disabled = false;
          btn.innerHTML = '🔑 Set New Password';
        }
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Server error. Please try again.</div>';
        btn.disabled = false;
        btn.innerHTML = '🔑 Set New Password';
      }
    }

    // Allow Enter key on form
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('formArea').style.display !== 'none') doReset();
    });

    validateToken();
  </script>
</body>
</html>
