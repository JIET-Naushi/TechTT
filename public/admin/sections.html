<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Years & Sections — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="logo">🎓 <span>College</span> Timetable — Admin</div>
    <nav>
      <a href="/index.html">Home</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>
  </header>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-title">Main</div>
      <a href="/admin/dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <div class="sidebar-title">Manage</div>
      <a href="/admin/sections.html" class="active"><span class="icon">🏛️</span> Years & Sections</a>
      <a href="/admin/subjects.html"><span class="icon">📚</span> Subjects</a>
      <a href="/admin/faculty.html"><span class="icon">👨‍🏫</span> Faculty</a>
      <a href="/admin/rooms.html"><span class="icon">🏫</span> Rooms</a>
      <div class="sidebar-title">Timetable</div>
      <a href="/admin/generate.html"><span class="icon">⚡</span> Generate</a>
      <a href="/admin/editor.html"><span class="icon">✏️</span> Editor</a>
      <div class="sidebar-title">Views</div>
      <a href="/views/class-timetable.html"><span class="icon">📅</span> Class View</a>
      <a href="/views/faculty-timetable.html"><span class="icon">👤</span> Faculty View</a>
      <a href="/views/location-timetable.html"><span class="icon">📍</span> Location View</a>
    </nav>
    <main class="admin-content">
      <div class="page-title">Years & Sections</div>
      <div id="alertBox"></div>
      <div id="yearsContainer"></div>

      <div class="card">
        <div class="card-title">Add Section</div>
        <form id="addSectionForm" style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
          <div class="form-group" style="margin:0;min-width:180px;">
            <label>Year</label>
            <select id="sectionYear" class="form-control" required>
              <option value="">Select Year</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;min-width:120px;">
            <label>Section Name</label>
            <input type="text" id="sectionName" class="form-control" placeholder="e.g. D" required maxlength="5">
          </div>
          <button type="submit" class="btn btn-primary">Add Section</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (!d.loggedIn) { location.href = '/login.html'; return; }
      deptId = d.user.isSuperAdmin ? 1 : d.user.department_id;
      init();
    });

    let years = [], sections = [], deptId = 1;

    async function init() {
      const [yRes, sRes] = await Promise.all([
        fetch(`/api/years?department_id=${deptId}`),
        fetch(`/api/sections?department_id=${deptId}`)
      ]);
      years    = await yRes.json();
      sections = await sRes.json();
      renderYears();
      const sel = document.getElementById('sectionYear');
      sel.innerHTML = '<option value="">Select Year</option>' +
        years.map(y => `<option value="${y.id}">${y.display_name}</option>`).join('');
    }

    function renderYears() {
      const container = document.getElementById('yearsContainer');
      container.innerHTML = years.map(y => {
        const ySections = sections.filter(s => s.year_id === y.id);
        return `
          <div class="card">
            <div class="card-title">${y.display_name} <small style="font-weight:400;color:#666;">(${y.name})</small></div>
            <div style="display:flex;flex-wrap:wrap;gap:12px;">
              ${ySections.map(s => {
                const numBatches = s.lab_subsections || 2;
                let batchNames;
                try { batchNames = JSON.parse(s.subsection_names || 'null'); } catch { batchNames = null; }
                if (!Array.isArray(batchNames) || batchNames.length !== numBatches)
                  batchNames = Array.from({ length: numBatches }, (_, i) => String.fromCharCode(65 + i));
                const batchBadges = batchNames.map(n =>
                  `<span style="background:#c5cae9;color:#1a237e;border-radius:3px;padding:0 5px;font-size:0.68rem;font-weight:700;">${n}</span>`
                ).join('');
                return `
                <div id="sec-chip-${s.id}" style="background:#e8eaf6;border-radius:10px;padding:10px 14px;min-width:180px;">
                  <!-- Section name row -->
                  <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
                    <span id="sec-label-${s.id}" style="color:#1a237e;font-weight:700;">Section ${s.name}</span>
                    <input id="sec-input-${s.id}" type="text" value="${s.name}" maxlength="5"
                      style="display:none;width:54px;padding:2px 6px;border:1.5px solid #1a237e;border-radius:4px;font-size:0.85rem;font-weight:700;color:#1a237e;text-align:center;"
                      onkeydown="handleEditKey(event, ${s.id})" />
                    <button class="btn btn-outline btn-sm" title="Rename section" onclick="startEdit(${s.id})" id="sec-edit-btn-${s.id}" style="padding:2px 7px;font-size:0.75rem;">✏️</button>
                    <button class="btn btn-success btn-sm" title="Save" onclick="saveEdit(${s.id})" id="sec-save-btn-${s.id}" style="display:none;padding:2px 7px;font-size:0.75rem;">✔</button>
                    <button class="btn btn-secondary btn-sm" title="Cancel" onclick="cancelEdit(${s.id})" id="sec-cancel-btn-${s.id}" style="display:none;padding:2px 7px;font-size:0.75rem;">✖</button>
                    <button class="btn btn-danger btn-sm" title="Delete" onclick="deleteSection(${s.id}, '${y.display_name} - Section ${s.name}')" id="sec-del-btn-${s.id}" style="padding:2px 7px;font-size:0.75rem;">🗑</button>
                  </div>
                  <!-- Lab batches row -->
                  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                    <span style="font-size:0.68rem;color:#666;">🔬 Lab batches:</span>
                    <div id="batch-display-${s.id}" style="display:flex;gap:3px;flex-wrap:wrap;">
                      ${batchBadges}
                    </div>
                    <button class="btn btn-outline btn-sm" title="Edit batch names & count"
                      onclick="openBatchEditor(${s.id})"
                      style="padding:1px 7px;font-size:0.68rem;border-color:#9fa8da;">⚙️ Edit</button>
                  </div>
                  <!-- Inline batch editor (hidden by default) -->
                  <div id="batch-editor-${s.id}" style="display:none;margin-top:8px;padding:8px;background:#fff;border-radius:6px;border:1px solid #c5cae9;">
                    <div style="font-size:0.75rem;font-weight:600;color:#333;margin-bottom:6px;">Number of batches:</div>
                    <select id="batch-count-${s.id}" class="form-control" style="width:80px;padding:4px;font-size:0.82rem;margin-bottom:8px;"
                      onchange="updateBatchInputs(${s.id})">
                      ${[1,2,3,4,5,6].map(n => `<option value="${n}" ${n===numBatches?'selected':''}>${n}</option>`).join('')}
                    </select>
                    <div style="font-size:0.75rem;font-weight:600;color:#333;margin-bottom:4px;">Batch names:</div>
                    <div id="batch-inputs-${s.id}" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
                      ${batchNames.map((n,i) => `
                        <input type="text" id="batch-name-${s.id}-${i}" value="${n}" maxlength="10"
                          style="width:64px;padding:4px 6px;border:1.5px solid #c5cae9;border-radius:4px;font-size:0.78rem;font-weight:700;text-align:center;"
                          placeholder="Batch ${i+1}">`).join('')}
                    </div>
                    <div style="display:flex;gap:6px;">
                      <button class="btn btn-primary btn-sm" onclick="saveBatches(${s.id})" style="font-size:0.75rem;padding:4px 10px;">Save</button>
                      <button class="btn btn-secondary btn-sm" onclick="closeBatchEditor(${s.id})" style="font-size:0.75rem;padding:4px 10px;">Cancel</button>
                    </div>
                  </div>
                </div>`; }).join('')}
              ${ySections.length === 0 ? '<span class="text-muted">No sections yet. Add one below.</span>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    function startEdit(id) {
      document.getElementById(`sec-label-${id}`).style.display = 'none';
      document.getElementById(`sec-input-${id}`).style.display = 'inline-block';
      document.getElementById(`sec-edit-btn-${id}`).style.display = 'none';
      document.getElementById(`sec-save-btn-${id}`).style.display = 'inline-flex';
      document.getElementById(`sec-cancel-btn-${id}`).style.display = 'inline-flex';
      document.getElementById(`sec-del-btn-${id}`).style.display = 'none';
      const input = document.getElementById(`sec-input-${id}`);
      input.focus();
      input.select();
    }

    function cancelEdit(id) {
      const sec = sections.find(s => s.id === id);
      document.getElementById(`sec-input-${id}`).value = sec ? sec.name : '';
      document.getElementById(`sec-label-${id}`).style.display = 'inline';
      document.getElementById(`sec-input-${id}`).style.display = 'none';
      document.getElementById(`sec-edit-btn-${id}`).style.display = 'inline-flex';
      document.getElementById(`sec-save-btn-${id}`).style.display = 'none';
      document.getElementById(`sec-cancel-btn-${id}`).style.display = 'none';
      document.getElementById(`sec-del-btn-${id}`).style.display = 'inline-flex';
    }

    function handleEditKey(event, id) {
      if (event.key === 'Enter') saveEdit(id);
      if (event.key === 'Escape') cancelEdit(id);
    }

    async function saveEdit(id) {
      const newName = document.getElementById(`sec-input-${id}`).value.trim().toUpperCase();
      if (!newName) { showAlert('Section name cannot be empty', 'error'); return; }

      const res = await fetch(`/api/admin/sections/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert(`Section renamed to ${newName}`, 'success');
        const sRes = await fetch(`/api/sections?department_id=${deptId}`);
        sections = await sRes.json();
        renderYears();
      } else {
        showAlert(data.error || 'Error renaming section', 'error');
        cancelEdit(id);
      }
    }

    function openBatchEditor(id) {
      document.getElementById(`batch-editor-${id}`).style.display = 'block';
    }
    function closeBatchEditor(id) {
      document.getElementById(`batch-editor-${id}`).style.display = 'none';
    }
    function updateBatchInputs(id) {
      const count = parseInt(document.getElementById(`batch-count-${id}`).value);
      const container = document.getElementById(`batch-inputs-${id}`);
      const existing = Array.from(container.querySelectorAll('input')).map(i => i.value);
      container.innerHTML = Array.from({ length: count }, (_, i) =>
        `<input type="text" id="batch-name-${id}-${i}" value="${existing[i] || String.fromCharCode(65+i)}" maxlength="10"
          style="width:64px;padding:4px 6px;border:1.5px solid #c5cae9;border-radius:4px;font-size:0.78rem;font-weight:700;text-align:center;"
          placeholder="Batch ${i+1}">`
      ).join('');
    }
    async function saveBatches(id) {
      const count = parseInt(document.getElementById(`batch-count-${id}`).value);
      const names = Array.from({ length: count }, (_, i) => {
        const val = document.getElementById(`batch-name-${id}-${i}`)?.value.trim();
        return val || String.fromCharCode(65 + i);
      });
      const res = await fetch(`/api/admin/sections/${id}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lab_subsections: count, subsection_names: names })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert(`Lab batches saved: ${names.join(', ')}`, 'success');
        const sRes = await fetch(`/api/sections?department_id=${deptId}`);
        sections = await sRes.json();
        renderYears();
      } else {
        showAlert(data.error || 'Error saving batches', 'error');
      }
    }

    document.getElementById('addSectionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const year_id = document.getElementById('sectionYear').value;
      const name = document.getElementById('sectionName').value.trim().toUpperCase();
      if (!year_id || !name) return;
      const res = await fetch('/api/admin/sections', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ year_id, name })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert(`Section ${name} added`, 'success');
        document.getElementById('sectionName').value = '';
        const sRes = await fetch(`/api/sections?department_id=${deptId}`);
        sections = await sRes.json();
        renderYears();
      } else {
        showAlert(data.error || 'Error', 'error');
      }
    });

    async function deleteSection(id, label) {
      if (!confirm(`Delete "${label}"? This will remove all timetable entries for this section.`)) return;
      const res = await fetch(`/api/admin/sections/${id}`, { method: 'DELETE' });
      const data = await res.json();
      showAlert(data.message || 'Deleted', 'success');
      const sRes = await fetch(`/api/sections?department_id=${deptId}`);
      sections = await sRes.json();
      renderYears();
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => box.innerHTML = '', 3000);
    }

    async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); location.href = '/login.html'; }
  </script>
</body>
</html>
