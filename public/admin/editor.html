<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable Editor — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Editor table ─────────────────────────────────────────────────── */
    .editor-table { width: 100%; border-collapse: collapse; min-width: 820px; }
    .editor-table th {
      background: #1a237e; color: #fff;
      padding: 10px 8px; font-size: 0.78rem; text-align: center; white-space: nowrap;
    }
    .editor-table th.day-hdr {
      background: #283593; min-width: 80px; position: sticky; left: 0; z-index: 2;
    }
    .editor-table td {
      border: 1px solid #ddd; padding: 0; vertical-align: top; min-width: 130px;
    }
    .editor-table td.day-cell {
      background: #e8eaf6; font-weight: 700; color: #1a237e;
      text-align: center; font-size: 0.82rem; padding: 6px 4px;
      white-space: nowrap; position: sticky; left: 0; z-index: 1;
    }

    /* ── Theory cell ──────────────────────────────────────────────────── */
    .theory-cell {
      display: flex; flex-direction: column; justify-content: center;
      padding: 6px 8px; min-height: 72px; cursor: pointer;
      transition: filter 0.15s;
    }
    .theory-cell:hover { filter: brightness(0.92); }
    .theory-cell .subj { font-weight: 700; font-size: 0.78rem; color: #0d47a1; line-height: 1.3; }
    .theory-cell .fac  { font-size: 0.7rem;  color: #444; margin-top: 2px; }
    .theory-cell .rm   { font-size: 0.67rem; color: #777; }
    .empty-cell {
      color: #bbb; text-align: center; font-size: 0.75rem;
      padding: 24px 4px; cursor: pointer; min-height: 72px;
    }
    .empty-cell:hover { background: #f0f4ff; color: #1a237e; }

    /* ── Lab cell (slot has batches) ──────────────────────────────────── */
    .lab-slot-cell { 
      padding: 0; display: flex; flex-direction: column; 
      min-height: 72px; max-height: 280px; overflow: hidden;
    }
    .lab-subj-header {
      font-weight: 700; font-size: 0.73rem; color: #fff;
      background: #1565c0; padding: 5px 8px; letter-spacing: 0.3px;
      flex-shrink: 0; border-bottom: 2px solid #0d47a1;
    }
    .lab-batches-container {
      display: flex; flex-direction: column; flex: 1; 
      overflow-y: auto; overflow-x: hidden; 
      min-height: 0; padding: 2px 0;
    }
    .batch-row {
      display: flex; align-items: center; gap: 0;
      border-bottom: 1px solid #e0e0e0; cursor: pointer;
      transition: background-color 0.15s ease; flex-shrink: 0;
      min-height: 40px; font-size: 0.7rem;
      padding: 0;
    }
    .batch-row:hover { background-color: #e3f2fd; }
    .batch-row:active { background-color: #bbdefb; }
    .batch-tag {
      background: #1976d2; color: #fff;
      font-weight: 700; font-size: 0.69rem;
      padding: 6px 8px; display: flex; align-items: center;
      min-width: 36px; justify-content: center; flex-shrink: 0;
      height: 100%;
    }
    .batch-body { 
      padding: 4px 8px; flex: 1; 
      display: flex; flex-direction: column; justify-content: center;
      min-height: 40px; overflow: hidden; gap: 1px;
    }
    .batch-body .b-fac { font-size: 0.7rem; color: #222; font-weight: 600; line-height: 1.1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .batch-body .b-rm  { font-size: 0.65rem; color: #555; line-height: 1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .batch-body .b-empty { font-size: 0.65rem; color: #999; font-style: italic; line-height: 1.1; }

    /* ── Modal ────────────────────────────────────────────────────────── */
    .modal { max-width: 500px; }
    .modal-badge {
      display: inline-block; background: #1976d2; color: #fff;
      font-size: 0.72rem; font-weight: 700; border-radius: 4px;
      padding: 2px 8px; margin-left: 8px; vertical-align: middle;
    }
    .modal-badge.lab { background: #2e7d32; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">🎓 <span>JIET</span> Timetable — Admin</div>
    <nav>
      <a href="/index.html">Home</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>
  </header>

  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-title">Main</div>
      <a href="/admin/dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <div class="sidebar-title">Manage</div>
      <a href="/admin/sections.html"><span class="icon">🏛️</span> Years & Sections</a>
      <a href="/admin/subjects.html"><span class="icon">📚</span> Subjects</a>
      <a href="/admin/faculty.html"><span class="icon">👨‍🏫</span> Faculty</a>
      <a href="/admin/rooms.html"><span class="icon">🏫</span> Rooms</a>
      <div class="sidebar-title">Timetable</div>
      <a href="/admin/generate.html"><span class="icon">⚡</span> Generate</a>
      <a href="/admin/editor.html" class="active"><span class="icon">✏️</span> Editor</a>
      <a href="/admin/conflicts.html"><span class="icon">⚠️</span> Conflicts</a>
      <div class="sidebar-title">Views</div>
      <a href="/views/class-timetable.html"><span class="icon">📅</span> Class View</a>
      <a href="/views/faculty-timetable.html"><span class="icon">👤</span> Faculty View</a>
      <a href="/views/location-timetable.html"><span class="icon">📍</span> Location View</a>
    </nav>

    <main class="admin-content">
      <div class="page-title">Timetable Editor</div>
      <div id="alertBox"></div>

      <!-- Filter bar -->
      <div class="card no-print">
        <div class="filter-bar">
          <div class="form-group">
            <label>Year</label>
            <select id="yearSelect" class="form-control" onchange="loadSections()">
              <option value="">Select Year</option>
            </select>
          </div>
          <div class="form-group">
            <label>Section</label>
            <select id="sectionSelect" class="form-control" onchange="loadTimetable()">
              <option value="">Select Section</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="loadTimetable()">Load</button>
          <button class="btn btn-secondary no-print" onclick="window.print()">🖨️ Print</button>
        </div>
      </div>

      <!-- Timetable grid (single, no tabs) -->
      <div id="timetableArea" style="display:none;">
        <div class="card">
          <div class="card-title" id="tableTitle">Timetable</div>
          <div style="overflow-x:auto;">
            <table class="editor-table" id="editorTable"></table>
          </div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📅</div>
        <p>Select a year and section to edit the timetable</p>
      </div>
    </main>
  </div>

  <!-- ── Edit modal ───────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Edit Slot</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div id="modalMeta" style="background:#f5f5f5;padding:10px;border-radius:6px;margin-bottom:16px;font-size:0.82rem;color:#555;"></div>

      <!-- Hidden state -->
      <input type="hidden" id="mSectionId">
      <input type="hidden" id="mSlotId">
      <input type="hidden" id="mDay">
      <input type="hidden" id="mEntryId">   <!-- existing DB id, blank = new -->
      <input type="hidden" id="mSubsection"><!-- batch name for lab, blank = theory -->

      <div class="form-group">
        <label>Subject</label>
        <select id="mSubject" class="form-control" onchange="onSubjectChange()">
          <option value="">— Free Period —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Faculty</label>
        <select id="mFaculty" class="form-control">
          <option value="">— No Faculty —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Room</label>
        <select id="mRoom" class="form-control">
          <option value="">— No Room —</option>
        </select>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-danger btn-sm" id="clearBtn" onclick="clearEntry()">Clear</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveEntry()">Save</button>
      </div>
    </div>
  </div>

  <script>
    /* ── Bootstrap ─────────────────────────────────────────────────────── */
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (!d.loggedIn) { location.href = '/login.html'; return; }
      init();
    });

    const DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5',
                    'color-6','color-7','color-8','color-9','color-10','color-11'];
    const colMap = {};
    function getColor(subId) {
      if (!colMap[subId]) colMap[subId] = COLORS[Object.keys(colMap).length % COLORS.length];
      return colMap[subId];
    }

    let slots = [], entries = [], subjects = [], faculty = [], rooms = [];
    let currentSectionId = null;

    async function init() {
      const [yR, slR, subR, fR, rR] = await Promise.all([
        fetch('/api/years'), fetch('/api/timeslots'),
        fetch('/api/subjects'), fetch('/api/faculty'), fetch('/api/rooms')
      ]);
      const years = await yR.json();
      slots    = await slR.json();
      subjects = await subR.json();
      faculty  = await fR.json();
      rooms    = await rR.json();

      const ySel = document.getElementById('yearSelect');
      years.forEach(y => ySel.insertAdjacentHTML('beforeend',
        `<option value="${y.id}">${y.display_name}</option>`));

      // Populate modal dropdowns
      const subSel = document.getElementById('mSubject');
      subjects.forEach(s => subSel.insertAdjacentHTML('beforeend',
        `<option value="${s.id}" data-type="${s.type}">[${s.year_name||'Y'+s.year_id}] ${s.name}</option>`));

      const fSel = document.getElementById('mFaculty');
      faculty.forEach(f => fSel.insertAdjacentHTML('beforeend',
        `<option value="${f.id}">${f.name}</option>`));

      const rSel = document.getElementById('mRoom');
      rooms.forEach(r => rSel.insertAdjacentHTML('beforeend',
        `<option value="${r.id}">${r.name} (${r.type})</option>`));
    }

    /* ── Section loading ────────────────────────────────────────────────── */
    async function loadSections() {
      const yId = document.getElementById('yearSelect').value;
      if (!yId) return;
      const secs = await (await fetch(`/api/sections?year_id=${yId}`)).json();
      const sel  = document.getElementById('sectionSelect');
      sel.innerHTML = '<option value="">Select Section</option>' +
        secs.map(s => `<option value="${s.id}">Section ${s.name}</option>`).join('');
    }

    /* ── Timetable loading ──────────────────────────────────────────────── */
    async function loadTimetable() {
      const sId = document.getElementById('sectionSelect').value;
      if (!sId) return;
      currentSectionId = sId;

      entries = await (await fetch(`/api/timetable/class?section_id=${sId}`)).json();

      const yText = document.getElementById('yearSelect').selectedOptions[0].text;
      const sText = document.getElementById('sectionSelect').selectedOptions[0].text;
      document.getElementById('tableTitle').textContent = `${yText} — ${sText}`;

      renderTable();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
    }

    /* ── Render ─────────────────────────────────────────────────────────── */
    function renderTable() {
      const teaching = slots.filter(s => !s.is_break);
      let html = '<thead><tr><th class="day-hdr">Day</th>';
      teaching.forEach(s => {
        html += `<th>Slot ${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
      });
      html += '</tr></thead><tbody>';

      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day}</td>`;
        teaching.forEach(slot => {
          html += renderCell(day, slot);
        });
        html += '</tr>';
      });
      html += '</tbody>';
      document.getElementById('editorTable').innerHTML = html;
    }

    function renderCell(day, slot) {
      const slotEntries = entries.filter(e => e.day_of_week === day && e.time_slot_id === slot.id);

      /* ── Empty ── */
      if (!slotEntries.length) {
        return `<td><div class="empty-cell"
          onclick="openModal('${day}',${slot.id},null,null)">+ Add</div></td>`;
      }

      /* ── Lab slot: one or more batch entries ── */
      const hasSubsection = slotEntries.some(e => e.subsection);
      if (hasSubsection) {
        const subjName = slotEntries[0].subject_name || '?';
        const color    = getColor(slotEntries[0].subject_id);
        let inner = `<div class="lab-subj-header">${subjName} <span style="opacity:.7;font-weight:400;font-size:.65rem;">LAB</span></div>`;
        inner += `<div class="lab-batches-container">`;
        slotEntries.forEach(e => {
          inner += `
            <div class="batch-row"
              onclick="openModal('${day}',${slot.id},${e.id},'${e.subsection}')">
              <div class="batch-tag">${e.subsection}</div>
              <div class="batch-body">
                ${e.faculty_name
                  ? `<div class="b-fac">${e.faculty_name}</div><div class="b-rm">${e.room_name||''}</div>`
                  : `<div class="b-empty">click to assign</div>`}
              </div>
            </div>`;
        });
        inner += `</div>`;
        return `<td class="lab-slot-cell ${color}" style="background:inherit;">${inner}</td>`;
      }

      /* ── Single theory entry ── */
      const e = slotEntries[0];
      const color = getColor(e.subject_id);
      return `<td>
        <div class="theory-cell ${color}"
          onclick="openModal('${day}',${slot.id},${e.id},null)">
          <div class="subj">${e.subject_name||'?'}</div>
          <div class="fac">${e.faculty_name||''}</div>
          <div class="rm">${e.room_name||''}</div>
        </div>
      </td>`;
    }

    /* ── Modal open ─────────────────────────────────────────────────────── */
    function openModal(day, slotId, entryId, subsection) {
      if (!currentSectionId) return;
      const slot = slots.find(s => s.id === slotId);

      // Title
      const batchLabel = subsection ? `<span class="modal-badge lab">Batch ${subsection}</span>` : '';
      document.getElementById('modalTitle').innerHTML =
        `${day} · ${slot.start_time}–${slot.end_time}${batchLabel}`;

      // Meta info
      document.getElementById('modalMeta').textContent =
        subsection ? `Lab batch ${subsection} — change faculty or room` : 'Theory / B.T.U. slot';

      // Hidden fields
      document.getElementById('mSectionId').value  = currentSectionId;
      document.getElementById('mSlotId').value     = slotId;
      document.getElementById('mDay').value        = day;
      document.getElementById('mEntryId').value    = entryId || '';
      document.getElementById('mSubsection').value = subsection || '';

      // Pre-fill from existing entry
      const e = entryId ? entries.find(x => x.id === entryId) : null;
      document.getElementById('mSubject').value = e?.subject_id || '';
      document.getElementById('mFaculty').value = e?.faculty_id || '';
      document.getElementById('mRoom').value    = e?.room_id    || '';

      // For lab batch: subject is read-only display only — keep it ENABLED
      // so the value is sent with the form, but hide the group visually
      const subjectGroup = document.getElementById('mSubject').closest('.form-group');
      document.getElementById('mSubject').disabled = false; // always enabled so value submits
      if (subsection) {
        subjectGroup.style.display = 'none'; // hide subject dropdown for lab batches
      } else {
        subjectGroup.style.display = '';
        onSubjectChange(); // apply room filter for theory
      }

      // Clear button only visible for existing entries
      document.getElementById('clearBtn').style.display = entryId ? 'inline-flex' : 'none';

      document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      document.getElementById('mSubject').closest('.form-group').style.display = '';
      document.getElementById('mSubject').disabled = false;
    }

    /* ── Save ───────────────────────────────────────────────────────────── */
    async function saveEntry() {
      const entryId   = document.getElementById('mEntryId').value;
      const subsection = document.getElementById('mSubsection').value;
      const body = {
        section_id:   parseInt(document.getElementById('mSectionId').value),
        time_slot_id: parseInt(document.getElementById('mSlotId').value),
        day_of_week:  document.getElementById('mDay').value,
        subject_id:   document.getElementById('mSubject').value   || null,
        faculty_id:   document.getElementById('mFaculty').value   || null,
        room_id:      document.getElementById('mRoom').value      || null,
        entry_id:     entryId ? parseInt(entryId) : undefined,
        subsection:   subsection || null
      };
      const res = await fetch('/api/admin/timetable/entry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (res.ok) {
        showAlert(data.message, 'success');
        closeModal();
        await loadTimetable();
      } else {
        showAlert(data.error || 'Save failed', 'error');
      }
    }

    /* ── Clear ──────────────────────────────────────────────────────────── */
    async function clearEntry() {
      const entryId = document.getElementById('mEntryId').value;
      if (!entryId) return;
      const res = await fetch(`/api/admin/timetable/entry/${entryId}`, { method: 'DELETE' });
      if (res.ok) {
        showAlert('Entry cleared', 'success');
        closeModal();
        await loadTimetable();
      } else {
        showAlert('Failed to clear entry', 'error');
      }
    }

    /* ── Helpers ────────────────────────────────────────────────────────── */
    function onSubjectChange() {
      // Auto-filter room dropdown to match subject type (lab ↔ classroom)
      const opt  = document.getElementById('mSubject').selectedOptions[0];
      const type = opt ? opt.dataset.type : '';
      const rSel = document.getElementById('mRoom');
      Array.from(rSel.options).forEach(o => {
        if (!o.value) { o.style.display = ''; return; }
        const room = rooms.find(r => r.id == o.value);
        if (!room) return;
        if (type === 'lab')    o.style.display = room.type === 'lab'       ? '' : 'none';
        else if (type)         o.style.display = room.type === 'classroom'  ? '' : 'none';
        else                   o.style.display = '';
      });
      // Reset room if currently selected room is hidden
      const cur = rSel.value;
      const curOpt = Array.from(rSel.options).find(o => o.value == cur);
      if (curOpt && curOpt.style.display === 'none') rSel.value = '';
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => box.innerHTML = '', 3000);
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/login.html';
    }
  </script>
</body>
</html>
