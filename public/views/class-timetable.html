<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Timetable — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="header no-print">
    <div class="logo">🎓 <span id="headerDept">JIET Universe — Department of Technology</span></div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/views/class-timetable.html" class="active">Class</a>
      <a href="/views/faculty-timetable.html">Faculty</a>
      <a href="/views/location-timetable.html">Location</a>
      <a href="/admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">Class Timetable</div>

    <div class="card no-print">
      <div class="filter-bar">
        <div class="form-group">
          <label>Year</label>
          <select id="yearSelect" class="form-control" onchange="loadSections()">
            <option value="">Select Year</option>
          </select>
        </div>
        <div class="form-group">
          <label>Section</label>
          <select id="sectionSelect" class="form-control" onchange="loadTimetable()">
            <option value="">Select Section</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadTimetable()">View</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
        <button class="btn btn-outline" onclick="exportExcel()" id="excelBtn" style="display:none;">📥 Export Excel</button>
      </div>
    </div>

    <div id="timetableArea" style="display:none;">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;" class="no-print">
          <div class="card-title" id="tableTitle" style="margin:0;border:none;padding:0;"></div>
        </div>
        <div class="print-header" style="text-align:center;margin-bottom:12px;display:none;">
          <h2 style="color:#1a237e;" id="printDeptName">Department of Technology</h2>
          <h3 id="printTitle"></h3>
          <p style="color:#666;">Academic Timetable</p>
        </div>
        <div class="timetable-grid">
          <table class="timetable-table" id="timetableTable"></table>
        </div>
        <div id="legend" style="margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;" class="no-print"></div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">📅</div>
      <p>Select a year and section to view the timetable</p>
    </div>
  </div>

  <script>
    // Load dynamic department name
    fetch('/api/settings').then(r => r.json()).then(s => {
      const dept = s.department_name || 'Department of Technology';
      const college = s.college_name || 'JIET Universe';
      document.getElementById('headerDept').textContent = `${college} — ${dept}`;
      document.querySelectorAll('.print-header h3').forEach(el => el.textContent = dept);
    }).catch(() => {});

    const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5','color-6','color-7','color-8','color-9','color-10','color-11'];
    const subjectColorMap = {};
    let slots = [], entries = [];
    let currentTitle = 'Timetable';
    let deptId = localStorage.getItem('selectedDepartmentId') || '1';

    function getSubjectColor(subjectId) {
      if (!subjectColorMap[subjectId]) {
        const keys = Object.keys(subjectColorMap).length;
        subjectColorMap[subjectId] = COLORS[keys % COLORS.length];
      }
      return subjectColorMap[subjectId];
    }

    async function init() {
      fetch('/api/auth/status').then(r => r.json()).then(d => {
        if (d.loggedIn) {
          document.getElementById('adminLink').style.display = 'inline';
          if (!d.user.isSuperAdmin && d.user.department_id) deptId = d.user.department_id;
        }
      });

      const [yRes, slRes] = await Promise.all([
        fetch(`/api/years?department_id=${deptId}`),
        fetch(`/api/timeslots?department_id=${deptId}`)
      ]);
      const years = await yRes.json();
      slots = await slRes.json();

      const sel = document.getElementById('yearSelect');
      years.forEach(y => sel.innerHTML += `<option value="${y.id}">${y.display_name}</option>`);

      const params = new URLSearchParams(location.search);
      if (params.get('section_id')) {
        const sRes = await fetch(`/api/sections?department_id=${deptId}`);
        const sections = await sRes.json();
        const sec = sections.find(s => s.id == params.get('section_id'));
        if (sec) {
          sel.value = sec.year_id;
          await loadSections();
          document.getElementById('sectionSelect').value = sec.id;
          await loadTimetable();
        }
      }
    }

    async function loadSections() {
      const yearId = document.getElementById('yearSelect').value;
      if (!yearId) return;
      const res = await fetch(`/api/sections?year_id=${yearId}`);
      const sections = await res.json();
      const sel = document.getElementById('sectionSelect');
      sel.innerHTML = '<option value="">Select Section</option>' +
        sections.map(s => `<option value="${s.id}">Section ${s.name}</option>`).join('');
    }

    async function loadTimetable() {
      const sectionId = document.getElementById('sectionSelect').value;
      if (!sectionId) return;

      const res = await fetch(`/api/timetable/class?section_id=${sectionId}`);
      entries = await res.json();

      const yearText = document.getElementById('yearSelect').options[document.getElementById('yearSelect').selectedIndex].text;
      const secText  = document.getElementById('sectionSelect').options[document.getElementById('sectionSelect').selectedIndex].text;
      currentTitle   = `${yearText} — ${secText}`;
      document.getElementById('tableTitle').textContent  = currentTitle;
      document.getElementById('printTitle').textContent  = currentTitle;

      renderTable();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('excelBtn').style.display     = 'inline-flex';
    }

    function renderTable() {
      const allSlots = slots;
      const table = document.getElementById('timetableTable');
      let html = '<thead><tr><th class="day-header">Day / Time</th>';
      allSlots.forEach(s => {
        if (s.is_break) {
          html += `<th class="slot-header" style="background:#f57c00;">LUNCH<br><small>${s.start_time}–${s.end_time}</small></th>`;
        } else {
          html += `<th class="slot-header">Slot ${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
        }
      });
      html += '</tr></thead><tbody>';
      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day}</td>`;
        allSlots.forEach(slot => {
          if (slot.is_break) { html += `<td class="break-cell">🍽️ LUNCH</td>`; return; }

          // Gather all entries for this day+slot (may be multiple for lab subsections)
          const slotEntries = entries.filter(e => e.day_of_week === day && e.time_slot_id === slot.id);

          if (!slotEntries.length) {
            html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`;
            return;
          }

          // Check if it's a lab with subsections
          const isLabWithSubs = slotEntries.length > 1 && slotEntries.every(e => e.subsection);

          if (isLabWithSubs) {
            // Render stacked subsection cells
            const color = getSubjectColor(slotEntries[0].subject_id);
            const batchRows = slotEntries.map(e => `
              <div class="lab-batch">
                <span class="lab-batch-label">${e.subsection}</span>
                <div class="lab-batch-info">
                  <div class="fac">${e.faculty_name || '—'}</div>
                  <div class="room">${e.room_name || ''}</div>
                </div>
              </div>`).join('');
            html += `<td><div class="lab-cell ${color}">
              <div class="lab-subject-name">${slotEntries[0].subject_name || '?'}
                <span style="font-size:0.6rem;background:rgba(0,0,0,0.13);border-radius:2px;padding:0 3px;margin-left:2px;vertical-align:middle;">LAB</span>
              </div>
              ${batchRows}
            </div></td>`;
          } else {
            // Single entry (theory, btu, or single-subsection)
            const entry = slotEntries[0];
            if (entry.subject_id) {
              const color = getSubjectColor(entry.subject_id);
              const isBtu = entry.subject_type === 'btu';
              html += `<td><div class="timetable-cell ${color}${isBtu ? ' btu-cell' : ''}">
                <div class="cell-subject">${entry.subject_name || '?'}${isBtu ? ' <span style="font-size:0.6rem;background:rgba(230,81,0,0.15);color:#e65100;border-radius:2px;padding:0 3px;vertical-align:middle;">BTU</span>' : ''}</div>
                <div class="cell-faculty">${entry.faculty_name || ''}</div>
                <div class="cell-room">${entry.room_name || ''}</div>
              </div></td>`;
            } else {
              html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`;
            }
          }
        });
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;

      const legend = document.getElementById('legend');
      const usedSubjects = [...new Set(entries.filter(e => e.subject_id).map(e => e.subject_id))];
      legend.innerHTML = '<strong style="margin-right:8px;">Legend:</strong>' +
        usedSubjects.map(id => {
          const e = entries.find(e => e.subject_id === id);
          const color = getSubjectColor(id);
          return `<span class="${color}" style="padding:3px 10px;border-radius:12px;font-size:0.78rem;">${e.subject_name} (${e.subject_code || ''})</span>`;
        }).join('');
    }

    // ── Excel Export ──────────────────────────────────────────────────────────
    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const teachingSlots = slots.filter(s => !s.is_break);

      // ── Sheet 1: Timetable Grid ───────────────────────────────────────────
      const deptName = document.getElementById('headerDept').textContent;
      const headerRow  = ['Day / Time', ...teachingSlots.map(s => `${s.start_time}–${s.end_time}`)];
      const dataRows   = DAYS.map(day => {
        const row = [day];
        teachingSlots.forEach(slot => {
          const slotEntries = entries.filter(e => e.day_of_week === day && e.time_slot_id === slot.id);
          if (!slotEntries.length) {
            row.push('NLF');
          } else if (slotEntries.length > 1 && slotEntries[0].subsection) {
            // Lab with batches
            row.push(slotEntries.map(e =>
              `${e.subject_name} [${e.subsection}] ${e.faculty_name||''} ${e.room_name||''}`
            ).join('\n'));
          } else {
            const e = slotEntries[0];
            const typeTag = e.subject_type === 'btu' ? ' [BTU]' : e.subject_type === 'lab' ? ' [LAB]' : '';
            row.push(`${e.subject_name}${typeTag}\n${e.faculty_name || ''}\n${e.room_name || ''}`);
          }
        });
        return row;
      });

      const wsData = [
        [deptName],
        [currentTitle],
        ['Academic Timetable'],
        [],
        headerRow,
        ...dataRows
      ];
      const ws = XLSX.utils.aoa_to_sheet(wsData);

      // Column widths
      ws['!cols'] = [{ wch: 12 }, ...teachingSlots.map(() => ({ wch: 22 }))];

      // Merge title rows across all columns
      const totalCols = teachingSlots.length + 1;
      ws['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: totalCols - 1 } },
        { s: { r: 1, c: 0 }, e: { r: 1, c: totalCols - 1 } },
        { s: { r: 2, c: 0 }, e: { r: 2, c: totalCols - 1 } },
      ];

      XLSX.utils.book_append_sheet(wb, ws, 'Timetable');

      // ── Sheet 2: Detailed List ────────────────────────────────────────────
      const listData = [
        ['Day', 'Time Slot', 'Start', 'End', 'Subject', 'Subject Code', 'Faculty', 'Room', 'Type'],
        ...entries
          .filter(e => e.subject_id)
          .sort((a, b) => DAYS.indexOf(a.day_of_week) - DAYS.indexOf(b.day_of_week) || a.slot_number - b.slot_number)
          .map(e => [
            e.day_of_week,
            `Slot ${e.slot_number}`,
            e.start_time,
            e.end_time,
            e.subject_name || '',
            e.subject_code || '',
            e.faculty_name || '',
            e.room_name || '',
            e.subject_type || 'theory'
          ])
      ];
      const ws2 = XLSX.utils.aoa_to_sheet(listData);
      ws2['!cols'] = [10,10,8,8,28,12,22,12,8].map(wch => ({ wch }));
      XLSX.utils.book_append_sheet(wb, ws2, 'Detailed List');

      // Download
      const fileName = `Timetable_${currentTitle.replace(/[^a-z0-9]/gi, '_')}_${new Date().toISOString().slice(0,10)}.xlsx`;
      XLSX.writeFile(wb, fileName);
    }

    init();
  </script>
</body>
</html>
