<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Timetable — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>
  <header class="header no-print">
    <div class="logo">🎓 <span id="headerDept">JIET</span></div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/views/class-timetable.html" class="active">Class</a>
      <a href="/views/faculty-timetable.html">Faculty</a>
      <a href="/views/location-timetable.html">Location</a>
      <a href="/admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">Class Timetable</div>

    <div class="card no-print">
      <div class="filter-bar">
        <div class="form-group">
          <label>Year</label>
          <select id="yearSelect" class="form-control" onchange="loadSections()">
            <option value="">Select Year</option>
          </select>
        </div>
        <div class="form-group">
          <label>Section</label>
          <select id="sectionSelect" class="form-control" onchange="loadTimetable()">
            <option value="">Select Section</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="loadTimetable()">View</button>
          <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
          <button class="btn btn-outline" onclick="exportExcel()" id="excelBtn" style="display:none;">📥 Excel</button>
        </div>
      </div>
    </div>

    <div id="timetableArea" style="display:none;">
      <div class="card" style="padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;" class="no-print">
          <div class="card-title" id="tableTitle" style="margin:0;border:none;padding:0;"></div>
        </div>
        <div class="print-header" style="text-align:center;margin-bottom:12px;display:none;">
          <h2 style="color:#1a237e;" id="printDeptName">Department of Technology</h2>
          <h3 id="printTitle"></h3>
          <p style="color:#666;">Academic Timetable</p>
        </div>
        <div class="scroll-hint no-print">← Scroll horizontally to see all slots →</div>
        <div class="timetable-grid">
          <table class="timetable-table" id="timetableTable"></table>
        </div>
        <div id="legend" style="margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;" class="no-print"></div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">📅</div>
      <p>Select a year and section to view the timetable</p>
    </div>
  </div>

  <script>
    fetch('/api/settings').then(r => r.json()).then(s => {
      const dept = s.department_name || 'Department of Technology';
      const college = s.college_name || 'JIET Universe';
      document.getElementById('headerDept').textContent = `🎓 ${college}`;
      document.getElementById('printDeptName').textContent = dept;
    }).catch(() => {});

    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5',
                    'color-6','color-7','color-8','color-9','color-10','color-11'];
    // Excel fill colors aligned with CSS color palette
    const XL_COLORS = [
      'DCE9FA','D9F0E1','FAD7E6','FEF0DA','EFD9FB','CCF3FA',
      'F4FAD1','FAE3D9','DDE2F7','C8EDE9','FEF6D0','EDE0DA'
    ];
    const subjectColorMap = {};
    const subjectXlColorMap = {};
    let slots = [], entries = [];
    let currentTitle = 'Timetable';
    let deptId = localStorage.getItem('selectedDepartmentId') || '1';

    function getColor(id) {
      if (!subjectColorMap[id]) {
        const idx = Object.keys(subjectColorMap).length % COLORS.length;
        subjectColorMap[id] = COLORS[idx];
        subjectXlColorMap[id] = XL_COLORS[idx];
      }
      return subjectColorMap[id];
    }
    function getXlColor(id) { getColor(id); return subjectXlColorMap[id]; }

    async function init() {
      fetch('/api/auth/status').then(r => r.json()).then(d => {
        if (d.loggedIn) {
          document.getElementById('adminLink').style.display = 'inline';
          if (!d.user.isSuperAdmin && d.user.department_id) deptId = d.user.department_id;
        }
      });
      const [yRes, slRes] = await Promise.all([
        fetch(`/api/years?department_id=${deptId}`),
        fetch(`/api/timeslots?department_id=${deptId}`)
      ]);
      const years = await yRes.json();
      slots = await slRes.json();
      const sel = document.getElementById('yearSelect');
      years.forEach(y => sel.innerHTML += `<option value="${y.id}">${y.display_name}</option>`);

      const params = new URLSearchParams(location.search);
      if (params.get('section_id')) {
        const sRes = await fetch(`/api/sections?department_id=${deptId}`);
        const sections = await sRes.json();
        const sec = sections.find(s => s.id == params.get('section_id'));
        if (sec) {
          sel.value = sec.year_id;
          await loadSections();
          document.getElementById('sectionSelect').value = sec.id;
          await loadTimetable();
        }
      }
    }

    async function loadSections() {
      const yearId = document.getElementById('yearSelect').value;
      if (!yearId) return;
      const sections = await (await fetch(`/api/sections?year_id=${yearId}`)).json();
      const sel = document.getElementById('sectionSelect');
      sel.innerHTML = '<option value="">Select Section</option>' +
        sections.map(s => `<option value="${s.id}">Section ${s.name}</option>`).join('');
    }

    async function loadTimetable() {
      const sectionId = document.getElementById('sectionSelect').value;
      if (!sectionId) return;
      entries = await (await fetch(`/api/timetable/class?section_id=${sectionId}`)).json();
      const yearText = document.getElementById('yearSelect').selectedOptions[0].text;
      const secText  = document.getElementById('sectionSelect').selectedOptions[0].text;
      currentTitle   = `${yearText} — ${secText}`;
      document.getElementById('tableTitle').textContent = currentTitle;
      document.getElementById('printTitle').textContent = currentTitle;
      renderTable();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('excelBtn').style.display     = 'inline-flex';
    }

    function renderTable() {
      const teaching = slots.filter(s => !s.is_break);
      const table = document.getElementById('timetableTable');
      let html = '<thead><tr><th class="day-header">Day</th>';
      slots.forEach(s => {
        if (s.is_break) html += `<th class="slot-header lunch-hdr">🍽️<br><small>${s.start_time}–${s.end_time}</small></th>`;
        else            html += `<th class="slot-header">P${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
      });
      html += '</tr></thead><tbody>';
      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day.slice(0,3)}<span class="day-rest">${day.slice(3)}</span></td>`;
        slots.forEach(slot => {
          if (slot.is_break) { html += `<td class="break-cell">🍽️<br><small>LUNCH</small></td>`; return; }
          const slotEntries = entries.filter(e => e.day_of_week === day && e.time_slot_id === slot.id);
          if (!slotEntries.length) { html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`; return; }
          if (slotEntries.some(e => e.subsection)) {
            const color = getColor(slotEntries[0].subject_id);
            const isBtu = slotEntries[0].subject_category === 'btu';
            const tags  = `<span class="tt-tag">LAB</span>${isBtu ? '<span class="tt-tag btu-tag">B.T.U.</span>' : ''}`;
            const rows  = slotEntries.map(e => `
              <div class="lab-batch">
                <span class="lab-batch-label">${e.subsection}</span>
                <div class="lab-batch-info">
                  <div class="fac">${e.faculty_name || '—'}</div>
                  <div class="room">${e.room_name || ''}</div>
                </div>
              </div>`).join('');
            html += `<td><div class="lab-cell ${color}${isBtu ? ' btu-cell' : ''}">
              <div class="lab-subject-name">${slotEntries[0].subject_name || '?'} ${tags}</div>${rows}</div></td>`;
            return;
          }
          const e = slotEntries[0];
          if (!e.subject_id) { html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`; return; }
          const color = getColor(e.subject_id);
          const isBtu = e.subject_category === 'btu';
          const isLab = e.subject_type === 'lab';
          const badge = isBtu ? '<span class="tt-tag btu-tag">B.T.U.</span>' : isLab ? '<span class="tt-tag">LAB</span>' : '';
          const batchBadge = e.subsection ? `<span class="tt-tag batch-tag">Batch ${e.subsection}</span>` : '';
          html += `<td><div class="timetable-cell ${color}${isBtu ? ' btu-cell' : ''}">
            <div class="cell-subject">${e.subject_name || '?'} ${badge}${batchBadge}</div>
            <div class="cell-faculty">${e.faculty_name || ''}</div>
            <div class="cell-room">${e.room_name || ''}</div>
          </div></td>`;
        });
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;
      const usedIds = [...new Set(entries.filter(e => e.subject_id).map(e => e.subject_id))];
      document.getElementById('legend').innerHTML = usedIds.length
        ? '<strong style="font-size:0.78rem;color:#555;align-self:center;">Legend:</strong>' +
          usedIds.map(id => {
            const e = entries.find(x => x.subject_id === id);
            return `<span class="${getColor(id)}" style="padding:3px 10px;border-radius:12px;font-size:0.78rem;">${e.subject_name}${e.subject_code ? ' ('+e.subject_code+')' : ''}</span>`;
          }).join('') : '';
    }

    // ── Excel helpers ──────────────────────────────────────────────────────────
    const BORDER = { style:'thin', color:{rgb:'CCCCCC'} };
    const THICK_BORDER = { style:'medium', color:{rgb:'1A237E'} };
    const FULL_BORDER = { top:BORDER, bottom:BORDER, left:BORDER, right:BORDER };
    const HEADER_FILL = { patternType:'solid', fgColor:{rgb:'1A237E'} };
    const DAY_FILL   = { patternType:'solid', fgColor:{rgb:'E8EAF6'} };
    const LUNCH_FILL = { patternType:'solid', fgColor:{rgb:'FFF8E1'} };
    const NLF_FILL   = { patternType:'solid', fgColor:{rgb:'F5F5F5'} };
    const TITLE_FILL = { patternType:'solid', fgColor:{rgb:'283593'} };

    function hdrCell(v) {
      return { v, t:'s', s:{ font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:HEADER_FILL, alignment:{horizontal:'center',vertical:'center',wrapText:true}, border:FULL_BORDER } };
    }
    function titleCell(v) {
      return { v, t:'s', s:{ font:{bold:true,color:{rgb:'FFFFFF'},sz:13}, fill:TITLE_FILL, alignment:{horizontal:'center',vertical:'center'} } };
    }
    function dayCell(v) {
      return { v, t:'s', s:{ font:{bold:true,color:{rgb:'1A237E'},sz:10}, fill:DAY_FILL, alignment:{horizontal:'center',vertical:'center'}, border:{ top:THICK_BORDER, bottom:THICK_BORDER, left:THICK_BORDER, right:BORDER } } };
    }
    function lunchCell() {
      return { v:'LUNCH', t:'s', s:{ font:{bold:true,color:{rgb:'F57C00'},sz:10}, fill:LUNCH_FILL, alignment:{horizontal:'center',vertical:'center'}, border:FULL_BORDER } };
    }
    function nlfCell() {
      return { v:'NLF', t:'s', s:{ font:{italic:true,color:{rgb:'BDBDBD'},sz:9}, fill:NLF_FILL, alignment:{horizontal:'center',vertical:'center'}, border:FULL_BORDER } };
    }
    function subjectCell(text, xlColor, isBtu) {
      const fgColor = { rgb: xlColor || 'E3F2FD' };
      return { v: text, t:'s', s:{
        font:{ bold:true, sz:9, color:{ rgb: isBtu ? 'E65100' : '0D47A1' } },
        fill:{ patternType:'solid', fgColor },
        alignment:{ horizontal:'left', vertical:'center', wrapText:true },
        border:{ ...FULL_BORDER, left: isBtu ? { style:'thick', color:{rgb:'E65100'} } : BORDER }
      }};
    }
    function blankCell(xlColor) {
      return { v:'', t:'s', s:{ fill:{ patternType:'solid', fgColor:{ rgb: xlColor || 'FFFFFF' } }, border:FULL_BORDER } };
    }

    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const teaching = slots.filter(s => !s.is_break);
      const deptName = document.getElementById('printDeptName').textContent;
      const numCols  = teaching.length + 1; // day col + slot cols

      // ── Sheet 1: Timetable ─────────────────────────────────────────────────
      const wsData = [];

      // Row 0 – Institution title (merged)
      wsData.push([titleCell(deptName), ...Array(numCols-1).fill({v:'',t:'s',s:{fill:TITLE_FILL}})]);
      // Row 1 – Timetable title
      wsData.push([titleCell(currentTitle), ...Array(numCols-1).fill({v:'',t:'s',s:{fill:TITLE_FILL}})]);
      // Row 2 – blank spacer
      wsData.push(Array(numCols).fill({v:'',t:'s'}));
      // Row 3 – Column headers
      wsData.push([ hdrCell('Day / Time'), ...teaching.map(s => hdrCell(`Slot ${s.slot_number}\n${s.start_time}–${s.end_time}`)) ]);

      // Data rows
      DAYS.forEach(day => {
        const row = [dayCell(day)];
        teaching.forEach(slot => {
          const se = entries.filter(e => e.day_of_week===day && e.time_slot_id===slot.id);
          if (!se.length) { row.push(nlfCell()); return; }
          if (se.some(e => e.subsection)) {
            const xlC = getXlColor(se[0].subject_id);
            const isBtu = se[0].subject_category === 'btu';
            const txt = se[0].subject_name + (isBtu ? ' [B.T.U.] LAB' : ' [LAB]') + '\n' +
              se.map(e => `Batch ${e.subsection}: ${e.faculty_name||'—'} | ${e.room_name||''}`).join('\n');
            row.push(subjectCell(txt, xlC, isBtu));
          } else {
            const e = se[0];
            const xlC = getXlColor(e.subject_id);
            const isBtu = e.subject_category === 'btu';
            const tag = isBtu ? ' [B.T.U.]' : e.subject_type==='lab' ? ' [LAB]' : '';
            const batch = e.subsection ? `\nBatch ${e.subsection}` : '';
            const txt = `${e.subject_name}${tag}${batch}\n${e.faculty_name||'—'}\n${e.room_name||'—'}`;
            row.push(subjectCell(txt, xlC, isBtu));
          }
        });
        wsData.push(row);
      });

      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [{wch:14}, ...teaching.map(()=>({wch:28}))];
      ws['!rows'] = [
        {hpt:22},{hpt:18},{hpt:8},{hpt:32},
        ...DAYS.map(()=>({hpt:54}))
      ];
      ws['!merges'] = [
        {s:{r:0,c:0},e:{r:0,c:numCols-1}},
        {s:{r:1,c:0},e:{r:1,c:numCols-1}},
        {s:{r:2,c:0},e:{r:2,c:numCols-1}},
      ];
      XLSX.utils.book_append_sheet(wb, ws, 'Timetable');

      // ── Sheet 2: Detailed List ─────────────────────────────────────────────
      const hdrs = ['Day','Slot','Time','Batch','Subject','Code','Faculty','Room','Type'].map(hdrCell);
      const listRows = [hdrs,
        ...entries.filter(e=>e.subject_id)
          .sort((a,b)=>DAYS.indexOf(a.day_of_week)-DAYS.indexOf(b.day_of_week)||a.slot_number-b.slot_number)
          .map(e => {
            const xlC = getXlColor(e.subject_id);
            const fill = { patternType:'solid', fgColor:{rgb:xlC||'FFFFFF'} };
            const s = { fill, border:FULL_BORDER, alignment:{vertical:'center'} };
            return [
              {v:e.day_of_week,t:'s',s},
              {v:`P${e.slot_number}`,t:'s',s},
              {v:`${e.start_time}–${e.end_time}`,t:'s',s},
              {v:e.subsection||'',t:'s',s},
              {v:e.subject_name||'',t:'s',s:{...s,font:{bold:true}}},
              {v:e.subject_code||'',t:'s',s},
              {v:e.faculty_name||'',t:'s',s},
              {v:e.room_name||'',t:'s',s},
              {v:e.subject_type||'theory',t:'s',s},
            ];
          })
      ];
      const ws2 = XLSX.utils.aoa_to_sheet(listRows);
      ws2['!cols'] = [12,6,14,8,28,10,22,12,10].map(w=>({wch:w}));
      ws2['!rows'] = [{hpt:24},...listRows.slice(1).map(()=>({hpt:18}))];
      XLSX.utils.book_append_sheet(wb, ws2, 'Detailed List');

      const fileName = `Timetable_${currentTitle.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`;
      XLSX.writeFile(wb, fileName);
    }

    init();
  </script>
</body>
</html>
