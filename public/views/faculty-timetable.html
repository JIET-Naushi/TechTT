<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Timetable — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="header no-print">
    <div class="logo">🎓 <span id="headerDept">JIET Universe — Department of Technology</span></div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/views/class-timetable.html">Class</a>
      <a href="/views/faculty-timetable.html" class="active">Faculty</a>
      <a href="/views/location-timetable.html">Location</a>
      <a href="/admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">Faculty Timetable</div>

    <div class="card no-print">
      <div class="filter-bar">
        <div class="form-group" style="min-width:260px;">
          <label>Select Faculty</label>
          <select id="facultySelect" class="form-control" onchange="loadTimetable()">
            <option value="">Select Faculty Member</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadTimetable()">View</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
        <button class="btn btn-outline" onclick="exportExcel()" id="excelBtn" style="display:none;">📥 Export Excel</button>
      </div>
    </div>

    <div id="timetableArea" style="display:none;">
      <div class="card">
        <div class="card-title" id="tableTitle"></div>
        <div class="print-header" style="text-align:center;margin-bottom:12px;display:none;">
          <h2 style="color:#1a237e;" id="printDeptName">Department of Technology</h2>
          <h3 id="printTitle"></h3>
          <p style="color:#666;">Faculty Teaching Schedule</p>
        </div>
        <div class="timetable-grid">
          <table class="timetable-table" id="timetableTable"></table>
        </div>
        <div id="summaryArea" style="margin-top:16px;"></div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">👨‍🏫</div>
      <p>Select a faculty member to view their teaching schedule</p>
    </div>
  </div>

  <script>
    fetch('/api/settings').then(r => r.json()).then(s => {
      const dept = s.department_name || 'Department of Technology';
      const college = s.college_name || 'JIET Universe';
      document.getElementById('headerDept').textContent = `${college} — ${dept}`;
      document.querySelectorAll('.print-header h3').forEach(el => el.textContent = dept);
    }).catch(() => {});

    const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5','color-6','color-7','color-8','color-9','color-10','color-11'];
    const subjectColorMap = {};
    let slots = [], entries = [];
    let currentFacultyName = 'Faculty';
    let deptId = localStorage.getItem('selectedDepartmentId') || '1';

    function getSubjectColor(subjectId) {
      if (!subjectColorMap[subjectId]) {
        subjectColorMap[subjectId] = COLORS[Object.keys(subjectColorMap).length % COLORS.length];
      }
      return subjectColorMap[subjectId];
    }

    async function init() {
      fetch('/api/auth/status').then(r => r.json()).then(d => {
        if (d.loggedIn) {
          document.getElementById('adminLink').style.display = 'inline';
          if (!d.user.isSuperAdmin && d.user.department_id) deptId = d.user.department_id;
        }
      });

      const [fRes, slRes] = await Promise.all([
        fetch(`/api/faculty?department_id=${deptId}`),
        fetch(`/api/timeslots?department_id=${deptId}`)
      ]);
      const faculty = await fRes.json();
      slots = await slRes.json();

      const sel = document.getElementById('facultySelect');
      faculty.forEach(f => {
        const roleLabel = f.role !== 'faculty' ? ` (${f.role === 'hod_mentor' ? 'HOD Mentor' : 'HOD Admin'})` : '';
        sel.innerHTML += `<option value="${f.id}">${f.name}${roleLabel}</option>`;
      });

      const params = new URLSearchParams(location.search);
      if (params.get('faculty_id')) {
        sel.value = params.get('faculty_id');
        await loadTimetable();
      }
    }

    async function loadTimetable() {
      const facultyId = document.getElementById('facultySelect').value;
      if (!facultyId) return;

      const res = await fetch(`/api/timetable/faculty?faculty_id=${facultyId}`);
      entries = await res.json();

      currentFacultyName = document.getElementById('facultySelect').options[document.getElementById('facultySelect').selectedIndex].text;
      document.getElementById('tableTitle').textContent = `${currentFacultyName} — Weekly Schedule`;
      document.getElementById('printTitle').textContent = currentFacultyName;

      renderTable();
      renderSummary();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('excelBtn').style.display     = 'inline-flex';
    }

    function renderTable() {
      const table = document.getElementById('timetableTable');
      let html = '<thead><tr><th class="day-header">Day / Time</th>';
      slots.forEach(s => {
        if (s.is_break) {
          html += `<th class="slot-header" style="background:#f57c00;">LUNCH<br><small>${s.start_time}–${s.end_time}</small></th>`;
        } else {
          html += `<th class="slot-header">Slot ${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
        }
      });
      html += '</tr></thead><tbody>';
      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day}</td>`;
        slots.forEach(slot => {
          if (slot.is_break) { html += `<td class="break-cell">🍽️ LUNCH</td>`; return; }
          const entry = entries.find(e => e.day_of_week === day && e.time_slot_id === slot.id);
          if (entry && entry.subject_id) {
            const color = getSubjectColor(entry.subject_id);
            html += `<td><div class="timetable-cell ${color}">
              <div class="cell-subject">${entry.subject_name || '?'}</div>
              <div class="cell-faculty" style="font-weight:600;">${entry.year_name || ''} - Sec ${entry.section_name || ''}</div>
              <div class="cell-room">${entry.room_name || ''}</div>
            </div></td>`;
          } else {
            html += `<td><div class="timetable-cell empty-cell">—</div></td>`;
          }
        });
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;
    }

    function renderSummary() {
      const totalPeriods   = entries.filter(e => e.subject_id).length;
      const uniqueSubjects = [...new Set(entries.filter(e => e.subject_id).map(e => e.subject_name))];
      const uniqueSections = [...new Set(entries.filter(e => e.section_id).map(e => `${e.year_name} Sec ${e.section_name}`))];
      document.getElementById('summaryArea').innerHTML = `
        <div style="display:flex;gap:16px;flex-wrap:wrap;" class="no-print">
          <div style="background:#e8eaf6;padding:12px 20px;border-radius:8px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:700;color:#1a237e;">${totalPeriods}</div>
            <div style="font-size:0.78rem;color:#666;">Total Periods/Week</div>
          </div>
          <div style="background:#e8f5e9;padding:12px 20px;border-radius:8px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:700;color:#2e7d32;">${uniqueSubjects.length}</div>
            <div style="font-size:0.78rem;color:#666;">Subjects</div>
          </div>
          <div style="background:#fff3e0;padding:12px 20px;border-radius:8px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:700;color:#e65100;">${uniqueSections.length}</div>
            <div style="font-size:0.78rem;color:#666;">Sections</div>
          </div>
        </div>
        ${uniqueSubjects.length > 0 ? `<p style="margin-top:12px;font-size:0.85rem;color:#555;" class="no-print"><strong>Subjects:</strong> ${uniqueSubjects.join(', ')}</p>` : ''}`;
    }

    // ── Excel Export ──────────────────────────────────────────────────────────
    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const teachingSlots = slots.filter(s => !s.is_break);
      const deptName = document.getElementById('headerDept').textContent;

      // Sheet 1: Timetable Grid
      const headerRow = ['Day / Time', ...teachingSlots.map(s => `${s.start_time}–${s.end_time}`)];
      const dataRows  = DAYS.map(day => {
        const row = [day];
        teachingSlots.forEach(slot => {
          const entry = entries.find(e => e.day_of_week === day && e.time_slot_id === slot.id);
          row.push(entry && entry.subject_id
            ? `${entry.subject_name}\n${entry.year_name} Sec ${entry.section_name}\n${entry.room_name || ''}`
            : '—');
        });
        return row;
      });
      const wsData = [
        [deptName], [currentFacultyName], ['Faculty Teaching Schedule'], [],
        headerRow, ...dataRows
      ];
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const totalCols = teachingSlots.length + 1;
      ws['!cols'] = [{ wch: 12 }, ...teachingSlots.map(() => ({ wch: 24 }))];
      ws['!merges'] = [
        { s: { r:0,c:0 }, e: { r:0,c:totalCols-1 } },
        { s: { r:1,c:0 }, e: { r:1,c:totalCols-1 } },
        { s: { r:2,c:0 }, e: { r:2,c:totalCols-1 } },
      ];
      XLSX.utils.book_append_sheet(wb, ws, 'Timetable');

      // Sheet 2: Detailed List
      const listData = [
        ['Day', 'Slot', 'Start', 'End', 'Subject', 'Code', 'Year', 'Section', 'Room', 'Type'],
        ...entries
          .filter(e => e.subject_id)
          .sort((a,b) => DAYS.indexOf(a.day_of_week) - DAYS.indexOf(b.day_of_week) || a.slot_number - b.slot_number)
          .map(e => [e.day_of_week, `Slot ${e.slot_number}`, e.start_time, e.end_time,
            e.subject_name||'', e.subject_code||'', e.year_name||'', `Sec ${e.section_name||''}`, e.room_name||'', e.subject_type||'theory'])
      ];
      const ws2 = XLSX.utils.aoa_to_sheet(listData);
      ws2['!cols'] = [10,8,8,8,28,12,18,10,12,8].map(wch => ({ wch }));
      XLSX.utils.book_append_sheet(wb, ws2, 'Detailed List');

      XLSX.writeFile(wb, `Faculty_Timetable_${currentFacultyName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    init();
  </script>
</body>
</html>
