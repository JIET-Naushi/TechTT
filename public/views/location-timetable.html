<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Timetable — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="header no-print">
    <div class="logo">🎓 <span id="headerDept">JIET</span></div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/views/class-timetable.html">Class</a>
      <a href="/views/faculty-timetable.html">Faculty</a>
      <a href="/views/location-timetable.html" class="active">Location</a>
      <a href="/admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">Room / Location Timetable</div>

    <div class="card no-print">
      <div class="filter-bar">
        <div class="form-group" style="flex:1;min-width:200px;">
          <label>Select Room / Location</label>
          <select id="roomSelect" class="form-control" onchange="loadTimetable()">
            <option value="">Select Room</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="loadTimetable()">View</button>
          <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
          <button class="btn btn-outline" onclick="exportExcel()" id="excelBtn" style="display:none;">📥 Excel</button>
          <button class="btn btn-outline" onclick="exportAllRooms()" id="exportAllBtn" style="display:none;">📥 All Rooms</button>
        </div>
      </div>
    </div>

    <div id="timetableArea" style="display:none;">
      <div class="card" style="padding:16px;">
        <div class="card-title" id="tableTitle"></div>
        <div class="print-header" style="text-align:center;margin-bottom:12px;display:none;">
          <h2 style="color:#1a237e;" id="printDeptName">Department of Technology</h2>
          <h3 id="printTitle"></h3>
          <p style="color:#666;">Room Allocation Schedule</p>
        </div>
        <div class="scroll-hint no-print">← Scroll horizontally to see all slots →</div>
        <div class="timetable-grid">
          <table class="timetable-table" id="timetableTable"></table>
        </div>
        <div id="summaryArea" style="margin-top:16px;"></div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🏫</div>
      <p>Select a room or location to view its schedule</p>
    </div>
  </div>

  <script>
    fetch('/api/settings').then(r => r.json()).then(s => {
      const dept = s.department_name || 'Department of Technology';
      const college = s.college_name || 'JIET Universe';
      document.getElementById('headerDept').textContent = `🎓 ${college}`;
      document.getElementById('printDeptName').textContent = dept;
    }).catch(() => {});

    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5',
                    'color-6','color-7','color-8','color-9','color-10','color-11'];
    const sectionColorMap = {};
    let slots = [], entries = [], allRooms = [];
    let currentRoomName = 'Room';
    let deptId = localStorage.getItem('selectedDepartmentId') || '1';

    function getColor(id) {
      if (!sectionColorMap[id]) sectionColorMap[id] = COLORS[Object.keys(sectionColorMap).length % COLORS.length];
      return sectionColorMap[id];
    }

    async function init() {
      fetch('/api/auth/status').then(r => r.json()).then(d => {
        if (d.loggedIn) {
          document.getElementById('adminLink').style.display = 'inline';
          if (!d.user.isSuperAdmin && d.user.department_id) deptId = d.user.department_id;
          document.getElementById('exportAllBtn').style.display = 'inline-flex';
        }
      });
      const [rRes, slRes] = await Promise.all([
        fetch(`/api/rooms?department_id=${deptId}`),
        fetch(`/api/timeslots?department_id=${deptId}`)
      ]);
      allRooms = await rRes.json();
      slots    = await slRes.json();
      const sel = document.getElementById('roomSelect');
      [...new Set(allRooms.map(r => r.type))].forEach(type => {
        const g = document.createElement('optgroup');
        g.label = type.charAt(0).toUpperCase() + type.slice(1) + 's';
        allRooms.filter(r => r.type === type).forEach(r => {
          const o = document.createElement('option');
          o.value = r.id; o.textContent = `${r.name} (cap: ${r.capacity})`;
          g.appendChild(o);
        });
        sel.appendChild(g);
      });
      const params = new URLSearchParams(location.search);
      if (params.get('room_id')) { sel.value = params.get('room_id'); await loadTimetable(); }
    }

    async function loadTimetable() {
      const roomId = document.getElementById('roomSelect').value;
      if (!roomId) return;
      entries = await (await fetch(`/api/timetable/location?room_id=${roomId}`)).json();
      currentRoomName = document.getElementById('roomSelect').selectedOptions[0].text;
      document.getElementById('tableTitle').textContent = `${currentRoomName} — Weekly Schedule`;
      document.getElementById('printTitle').textContent = currentRoomName;
      renderTable();
      renderSummary();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('excelBtn').style.display     = 'inline-flex';
    }

    function renderTable() {
      const table = document.getElementById('timetableTable');
      let html = '<thead><tr><th class="day-header">Day</th>';
      slots.forEach(s => {
        if (s.is_break) html += `<th class="slot-header lunch-hdr">🍽️<br><small>${s.start_time}–${s.end_time}</small></th>`;
        else            html += `<th class="slot-header">P${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
      });
      html += '</tr></thead><tbody>';

      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day.slice(0,3)}<span class="day-rest">${day.slice(3)}</span></td>`;
        slots.forEach(slot => {
          if (slot.is_break) { html += `<td class="break-cell">🍽️<br><small>LUNCH</small></td>`; return; }

          // Location view: multiple entries possible for lab batches in same room
          const slotEntries = entries.filter(e => e.day_of_week === day && e.time_slot_id === slot.id);

          if (!slotEntries.length) {
            html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`; return;
          }

          if (slotEntries.some(e => e.subsection)) {
            const e0    = slotEntries[0];
            const color = getColor(e0.section_id);
            const isBtu = e0.subject_category === 'btu';
            const tags  = `<span class="tt-tag">LAB</span>${isBtu ? '<span class="tt-tag btu-tag">B.T.U.</span>' : ''}`;
            const rows  = slotEntries.map(e => `
              <div class="lab-batch">
                <span class="lab-batch-label">${e.subsection}</span>
                <div class="lab-batch-info">
                  <div class="fac">${e.faculty_name || '—'}</div>
                  <div class="room">${e.year_name || ''} — Sec ${e.section_name || ''}</div>
                </div>
              </div>`).join('');
            html += `<td><div class="lab-cell ${color}${isBtu ? ' btu-cell' : ''}">
              <div class="lab-subject-name">${e0.subject_name || '?'} ${tags}</div>
              ${rows}
            </div></td>`;
            return;
          }

          const e = slotEntries[0];
          if (!e.subject_id) { html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`; return; }
          const color  = getColor(e.section_id);
          const isBtu  = e.subject_category === 'btu';
          const isLab  = e.subject_type === 'lab';
          const badge  = isBtu ? '<span class="tt-tag btu-tag">B.T.U.</span>'
                       : isLab ? '<span class="tt-tag">LAB</span>' : '';
          const batchBadge = e.subsection ? `<span class="tt-tag batch-tag">Batch ${e.subsection}</span>` : '';
          html += `<td><div class="timetable-cell ${color}${isBtu ? ' btu-cell' : ''}">
            <div class="cell-subject">${e.subject_name || '?'} ${badge}${batchBadge}</div>
            <div class="cell-faculty">${e.faculty_name || ''}</div>
            <div class="cell-room" style="font-weight:600;">${e.year_name || ''} — Sec ${e.section_name || ''}</div>
          </div></td>`;
        });
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;
    }

    function renderSummary() {
      const total    = entries.filter(e => e.subject_id).length;
      const totalSl  = slots.filter(s => !s.is_break).length * 6;
      const util     = Math.round((total / totalSl) * 100);
      const sections = [...new Set(entries.filter(e => e.section_id).map(e => `${e.year_name} Sec ${e.section_name}`))];
      document.getElementById('summaryArea').innerHTML = `
        <div style="display:flex;gap:12px;flex-wrap:wrap;" class="no-print">
          <div class="summary-chip" style="background:#e8eaf6;color:#1a237e;">${total}<small>Periods Used</small></div>
          <div class="summary-chip" style="background:#e8f5e9;color:#2e7d32;">${util}%<small>Utilization</small></div>
          <div class="summary-chip" style="background:#fff3e0;color:#e65100;">${totalSl-total}<small>Free Periods</small></div>
        </div>
        ${sections.length ? `<p style="margin-top:10px;font-size:0.82rem;color:#555;" class="no-print"><strong>Used by:</strong> ${sections.join(', ')}</p>` : ''}`;
    }

    function buildExcelRows(roomEntries, teaching) {
      return DAYS.map(day => {
        const row = [day];
        teaching.forEach(slot => {
          const slotEntries = roomEntries.filter(e => e.day_of_week===day && e.time_slot_id===slot.id);
          if (!slotEntries.length) { row.push('NLF'); return; }
          if (slotEntries.some(e => e.subsection)) {
            row.push(slotEntries.map(e=>`Batch ${e.subsection}: ${e.subject_name} | ${e.faculty_name||''} | ${e.year_name} Sec ${e.section_name}`).join('\n'));
          } else {
            const e = slotEntries[0];
            const tag = e.subject_category==='btu'?' [BTU]':e.subject_type==='lab'?' [LAB]':'';
            row.push(`${e.subject_name}${tag}${e.subsection?' Batch '+e.subsection:''}\n${e.faculty_name||''}\n${e.year_name||''} Sec ${e.section_name||''}`);
          }
        });
        return row;
      });
    }

    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const teaching = slots.filter(s => !s.is_break);
      const deptName = document.getElementById('printDeptName').textContent;
      const headerRow = ['Day',...teaching.map(s=>`${s.start_time}–${s.end_time}`)];
      const ws = XLSX.utils.aoa_to_sheet([[deptName],[currentRoomName],['Room Schedule'],[],headerRow,...buildExcelRows(entries,teaching)]);
      ws['!cols'] = [{wch:12},...teaching.map(()=>({wch:26}))];
      const tc = teaching.length+1;
      ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:tc-1}},{s:{r:1,c:0},e:{r:1,c:tc-1}},{s:{r:2,c:0},e:{r:2,c:tc-1}}];
      XLSX.utils.book_append_sheet(wb, ws, currentRoomName.replace(/[\\\/\?\*\[\]:]/g,'').slice(0,31));
      XLSX.writeFile(wb,`Room_${currentRoomName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    async function exportAllRooms() {
      const btn = document.getElementById('exportAllBtn');
      btn.textContent = '⏳ Generating...'; btn.disabled = true;
      try {
        const wb = XLSX.utils.book_new();
        const teaching = slots.filter(s => !s.is_break);
        const deptName = document.getElementById('printDeptName').textContent;
        const summaryRows = [['Room','Type','Capacity','Periods Used','Free','Utilization %']];
        for (const room of allRooms) {
          const re = await (await fetch(`/api/timetable/location?room_id=${room.id}`)).json();
          const used = re.filter(e => e.subject_id).length;
          const tot  = teaching.length * 6;
          summaryRows.push([room.name, room.type, room.capacity, used, tot-used, Math.round((used/tot)*100)+'%']);
          const headerRow = ['Day',...teaching.map(s=>`${s.start_time}–${s.end_time}`)];
          const ws = XLSX.utils.aoa_to_sheet([[deptName],[room.name],['Room Schedule'],[],headerRow,...buildExcelRows(re,teaching)]);
          ws['!cols'] = [{wch:12},...teaching.map(()=>({wch:26}))];
          const tc = teaching.length+1;
          ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:tc-1}},{s:{r:1,c:0},e:{r:1,c:tc-1}},{s:{r:2,c:0},e:{r:2,c:tc-1}}];
          XLSX.utils.book_append_sheet(wb, ws, room.name.replace(/[\\\/\?\*\[\]:]/g,'').slice(0,31));
        }
        const wsSumm = XLSX.utils.aoa_to_sheet([[deptName],['Room Utilization Summary'],[],...summaryRows]);
        wsSumm['!cols'] = [20,12,10,14,10,14].map(w=>({wch:w}));
        wsSumm['!merges'] = [{s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}}];
        wb.SheetNames.unshift('Summary'); wb.Sheets['Summary'] = wsSumm;
        XLSX.writeFile(wb,`All_Rooms_${deptName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
      } finally {
        btn.textContent = '📥 All Rooms'; btn.disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
