<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Timetable — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>
  <header class="header no-print">
    <div class="logo">🎓 <span id="headerDept">JIET</span></div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/views/class-timetable.html">Class</a>
      <a href="/views/faculty-timetable.html">Faculty</a>
      <a href="/views/location-timetable.html" class="active">Location</a>
      <a href="/admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">Room / Location Timetable</div>

    <div class="card no-print">
      <div class="filter-bar">
        <div class="form-group" style="flex:1;min-width:200px;">
          <label>Select Room / Location</label>
          <select id="roomSelect" class="form-control" onchange="loadTimetable()">
            <option value="">Select Room</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="loadTimetable()">View</button>
          <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
          <button class="btn btn-outline" onclick="exportExcel()" id="excelBtn" style="display:none;">📥 Excel</button>
          <button class="btn btn-outline" onclick="exportAllRooms()" id="exportAllBtn" style="display:none;">📥 All Rooms</button>
        </div>
      </div>
    </div>

    <div id="timetableArea" style="display:none;">
      <div class="card" style="padding:16px;">
        <div class="card-title" id="tableTitle"></div>
        <div class="print-header" style="text-align:center;margin-bottom:12px;display:none;">
          <h2 style="color:#1a237e;" id="printDeptName">Department of Technology</h2>
          <h3 id="printTitle"></h3>
          <p style="color:#666;">Room Allocation Schedule</p>
        </div>
        <div class="scroll-hint no-print">← Scroll horizontally to see all slots →</div>
        <div class="timetable-grid">
          <table class="timetable-table" id="timetableTable"></table>
        </div>
        <div id="summaryArea" style="margin-top:16px;"></div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🏫</div>
      <p>Select a room or location to view its schedule</p>
    </div>
  </div>

  <script>
    fetch('/api/settings').then(r => r.json()).then(s => {
      const dept = s.department_name || 'Department of Technology';
      const college = s.college_name || 'JIET Universe';
      document.getElementById('headerDept').textContent = `🎓 ${college}`;
      document.getElementById('printDeptName').textContent = dept;
    }).catch(() => {});

    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5',
                    'color-6','color-7','color-8','color-9','color-10','color-11'];
    const XL_COLORS = [
      'DCE9FA','D9F0E1','FAD7E6','FEF0DA','EFD9FB','CCF3FA',
      'F4FAD1','FAE3D9','DDE2F7','C8EDE9','FEF6D0','EDE0DA'
    ];
    const sectionColorMap = {}, sectionXlColorMap = {};
    let slots = [], entries = [], allRooms = [];
    let currentRoomName = 'Room';
    let deptId = localStorage.getItem('selectedDepartmentId') || '1';

    function getColor(id) {
      if (!sectionColorMap[id]) {
        const idx = Object.keys(sectionColorMap).length % COLORS.length;
        sectionColorMap[id] = COLORS[idx];
        sectionXlColorMap[id] = XL_COLORS[idx];
      }
      return sectionColorMap[id];
    }
    function getXlColor(id) { getColor(id); return sectionXlColorMap[id]; }

    async function init() {
      fetch('/api/auth/status').then(r => r.json()).then(d => {
        if (d.loggedIn) {
          document.getElementById('adminLink').style.display = 'inline';
          if (!d.user.isSuperAdmin && d.user.department_id) deptId = d.user.department_id;
          document.getElementById('exportAllBtn').style.display = 'inline-flex';
        }
      });
      const [rRes, slRes] = await Promise.all([
        fetch(`/api/rooms?department_id=${deptId}`),
        fetch(`/api/timeslots?department_id=${deptId}`)
      ]);
      allRooms = await rRes.json();
      slots    = await slRes.json();
      const sel = document.getElementById('roomSelect');
      [...new Set(allRooms.map(r => r.type))].forEach(type => {
        const g = document.createElement('optgroup');
        g.label = type.charAt(0).toUpperCase() + type.slice(1) + 's';
        allRooms.filter(r => r.type === type).forEach(r => {
          const o = document.createElement('option');
          o.value = r.id; o.textContent = `${r.name} (cap: ${r.capacity})`;
          g.appendChild(o);
        });
        sel.appendChild(g);
      });
      const params = new URLSearchParams(location.search);
      if (params.get('room_id')) { sel.value = params.get('room_id'); await loadTimetable(); }
    }

    async function loadTimetable() {
      const roomId = document.getElementById('roomSelect').value;
      if (!roomId) return;
      entries = await (await fetch(`/api/timetable/location?room_id=${roomId}`)).json();
      currentRoomName = document.getElementById('roomSelect').selectedOptions[0].text;
      document.getElementById('tableTitle').textContent = `${currentRoomName} — Weekly Schedule`;
      document.getElementById('printTitle').textContent = currentRoomName;
      renderTable();
      renderSummary();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('excelBtn').style.display     = 'inline-flex';
    }

    function renderTable() {
      const table = document.getElementById('timetableTable');
      let html = '<thead><tr><th class="day-header">Day</th>';
      slots.forEach(s => {
        if (s.is_break) html += `<th class="slot-header lunch-hdr">🍽️<br><small>${s.start_time}–${s.end_time}</small></th>`;
        else            html += `<th class="slot-header">P${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
      });
      html += '</tr></thead><tbody>';
      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day.slice(0,3)}<span class="day-rest">${day.slice(3)}</span></td>`;
        slots.forEach(slot => {
          if (slot.is_break) { html += `<td class="break-cell">🍽️<br><small>LUNCH</small></td>`; return; }
          const se = entries.filter(e => e.day_of_week===day && e.time_slot_id===slot.id);
          if (!se.length) { html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`; return; }
          if (se.some(e => e.subsection)) {
            const e0 = se[0];
            const color = getColor(e0.section_id);
            const isBtu = e0.subject_category==='btu';
            const tags  = `<span class="tt-tag">LAB</span>${isBtu ? '<span class="tt-tag btu-tag">B.T.U.</span>' : ''}`;
            const rows  = se.map(e => `
              <div class="lab-batch">
                <span class="lab-batch-label">${e.subsection}</span>
                <div class="lab-batch-info">
                  <div class="fac">${e.faculty_name||'—'}</div>
                  <div class="room">${e.year_name||''} — Sec ${e.section_name||''}</div>
                </div>
              </div>`).join('');
            html += `<td><div class="lab-cell ${color}${isBtu?' btu-cell':''}">
              <div class="lab-subject-name">${e0.subject_name||'?'} ${tags}</div>${rows}</div></td>`;
            return;
          }
          const e = se[0];
          if (!e.subject_id) { html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`; return; }
          const color = getColor(e.section_id);
          const isBtu = e.subject_category==='btu';
          const isLab = e.subject_type==='lab';
          const badge = isBtu ? '<span class="tt-tag btu-tag">B.T.U.</span>' : isLab ? '<span class="tt-tag">LAB</span>' : '';
          const batchBadge = e.subsection ? `<span class="tt-tag batch-tag">Batch ${e.subsection}</span>` : '';
          html += `<td><div class="timetable-cell ${color}${isBtu?' btu-cell':''}">
            <div class="cell-subject">${e.subject_name||'?'} ${badge}${batchBadge}</div>
            <div class="cell-faculty">${e.faculty_name||''}</div>
            <div class="cell-room" style="font-weight:600;">${e.year_name||''} — Sec ${e.section_name||''}</div>
          </div></td>`;
        });
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;
    }

    function renderSummary() {
      const total    = entries.filter(e => e.subject_id).length;
      const totalSl  = slots.filter(s => !s.is_break).length * 6;
      const util     = Math.round((total / totalSl) * 100);
      const sections = [...new Set(entries.filter(e => e.section_id).map(e => `${e.year_name} Sec ${e.section_name}`))];
      document.getElementById('summaryArea').innerHTML = `
        <div style="display:flex;gap:12px;flex-wrap:wrap;" class="no-print">
          <div class="summary-chip" style="background:#e8eaf6;color:#1a237e;">${total}<small>Periods Used</small></div>
          <div class="summary-chip" style="background:#e8f5e9;color:#2e7d32;">${util}%<small>Utilization</small></div>
          <div class="summary-chip" style="background:#fff3e0;color:#e65100;">${totalSl-total}<small>Free Periods</small></div>
        </div>
        ${sections.length ? `<p style="margin-top:10px;font-size:0.82rem;color:#555;" class="no-print"><strong>Used by:</strong> ${sections.join(', ')}</p>` : ''}`;
    }

    // ── Excel helpers ──────────────────────────────────────────────────────────
    const BORDER     = { style:'thin',  color:{rgb:'CCCCCC'} };
    const FULL_BORDER = { top:BORDER, bottom:BORDER, left:BORDER, right:BORDER };
    const HEADER_FILL = { patternType:'solid', fgColor:{rgb:'1A237E'} };
    const DAY_FILL    = { patternType:'solid', fgColor:{rgb:'E8EAF6'} };
    const NLF_FILL    = { patternType:'solid', fgColor:{rgb:'F5F5F5'} };
    const TITLE_FILL  = { patternType:'solid', fgColor:{rgb:'283593'} };

    function hdrCell(v) {
      return {v,t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:HEADER_FILL,alignment:{horizontal:'center',vertical:'center',wrapText:true},border:FULL_BORDER}};
    }
    function titleCell(v, big) {
      return {v,t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'},sz:big?13:11},fill:TITLE_FILL,alignment:{horizontal:'center',vertical:'center'}}};
    }
    function dayCell(v) {
      return {v,t:'s',s:{font:{bold:true,color:{rgb:'1A237E'},sz:10},fill:DAY_FILL,alignment:{horizontal:'center',vertical:'center'},border:FULL_BORDER}};
    }
    function nlfCell() {
      return {v:'NLF',t:'s',s:{font:{italic:true,color:{rgb:'BDBDBD'},sz:9},fill:NLF_FILL,alignment:{horizontal:'center',vertical:'center'},border:FULL_BORDER}};
    }
    function subjectCell(text, xlColor, isBtu) {
      return {v:text,t:'s',s:{
        font:{bold:true,sz:9,color:{rgb:isBtu?'E65100':'0D47A1'}},
        fill:{patternType:'solid',fgColor:{rgb:xlColor||'E3F2FD'}},
        alignment:{horizontal:'left',vertical:'center',wrapText:true},
        border:{...FULL_BORDER,left:isBtu?{style:'thick',color:{rgb:'E65100'}}:BORDER}
      }};
    }

    function buildSheet(roomEntries, roomLabel, deptName) {
      const teaching = slots.filter(s => !s.is_break);
      const numCols  = teaching.length + 1;
      const wsData   = [];
      wsData.push([titleCell(deptName, true), ...Array(numCols-1).fill({v:'',t:'s',s:{fill:TITLE_FILL}})]);
      wsData.push([titleCell(roomLabel), ...Array(numCols-1).fill({v:'',t:'s',s:{fill:TITLE_FILL}})]);
      wsData.push(Array(numCols).fill({v:'',t:'s'}));
      wsData.push([hdrCell('Day / Time'), ...teaching.map(s => hdrCell(`Slot ${s.slot_number}\n${s.start_time}–${s.end_time}`))]);
      DAYS.forEach(day => {
        const row = [dayCell(day)];
        teaching.forEach(slot => {
          const se = roomEntries.filter(e => e.day_of_week===day && e.time_slot_id===slot.id);
          if (!se.length) { row.push(nlfCell()); return; }
          if (se.some(e => e.subsection)) {
            const xlC  = getXlColor(se[0].section_id);
            const isBtu = se[0].subject_category==='btu';
            const txt = se[0].subject_name+(isBtu?' [B.T.U.] LAB':' [LAB]')+'\n'+
              se.map(e=>`Batch ${e.subsection}: ${e.faculty_name||'—'} | ${e.year_name} Sec ${e.section_name}`).join('\n');
            row.push(subjectCell(txt, xlC, isBtu));
          } else {
            const e = se[0];
            const xlC  = getXlColor(e.section_id);
            const isBtu = e.subject_category==='btu';
            const tag = isBtu?' [B.T.U.]':e.subject_type==='lab'?' [LAB]':'';
            row.push(subjectCell(
              `${e.subject_name}${tag}${e.subsection?' Batch '+e.subsection:''}\n${e.faculty_name||'—'}\n${e.year_name||''} — Sec ${e.section_name||''}`,
              xlC, isBtu
            ));
          }
        });
        wsData.push(row);
      });
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [{wch:14},...teaching.map(()=>({wch:28}))];
      ws['!rows'] = [{hpt:22},{hpt:18},{hpt:8},{hpt:32},...DAYS.map(()=>({hpt:54}))];
      ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:numCols-1}},{s:{r:1,c:0},e:{r:1,c:numCols-1}},{s:{r:2,c:0},e:{r:2,c:numCols-1}}];
      return ws;
    }

    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const deptName = document.getElementById('printDeptName').textContent;
      const ws = buildSheet(entries, currentRoomName, deptName);
      const sheetName = currentRoomName.replace(/[\\\/\?\*\[\]:]/g,'').slice(0,31);
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, `Room_${currentRoomName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    async function exportAllRooms() {
      const btn = document.getElementById('exportAllBtn');
      btn.textContent = '⏳ Generating...'; btn.disabled = true;
      try {
        const wb       = XLSX.utils.book_new();
        const deptName = document.getElementById('printDeptName').textContent;
        const teaching = slots.filter(s => !s.is_break);

        // Summary sheet data
        const SUMM_HDR_FILL = { patternType:'solid', fgColor:{rgb:'1A237E'} };
        const summHdr = ['Room','Type','Capacity','Periods Used','Free Periods','Utilization %'].map(v=>
          ({v,t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:SUMM_HDR_FILL,alignment:{horizontal:'center'},border:{top:BORDER,bottom:BORDER,left:BORDER,right:BORDER}}})
        );
        const summRows = [
          [{v:deptName,t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'},sz:13},fill:{patternType:'solid',fgColor:{rgb:'283593'}},alignment:{horizontal:'center'}}},...Array(5).fill({v:'',t:'s',s:{fill:{patternType:'solid',fgColor:{rgb:'283593'}}}})],
          [{v:'Room Utilization Summary',t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{patternType:'solid',fgColor:{rgb:'1A237E'}},alignment:{horizontal:'center'}}},...Array(5).fill({v:'',t:'s',s:{fill:{patternType:'solid',fgColor:{rgb:'1A237E'}}}})],
          Array(6).fill({v:'',t:'s'}),
          summHdr
        ];

        for (const room of allRooms) {
          const re   = await (await fetch(`/api/timetable/location?room_id=${room.id}`)).json();
          const used = re.filter(e => e.subject_id).length;
          const tot  = teaching.length * 6;
          const utilPct = Math.round((used/tot)*100);
          const utilFill = utilPct > 75 ? 'E8F5E9' : utilPct > 40 ? 'FFF8E1' : 'FFEBEE';
          summRows.push([
            {v:room.name,t:'s',s:{font:{bold:true,sz:10},alignment:{horizontal:'left'},border:FULL_BORDER}},
            {v:room.type,t:'s',s:{alignment:{horizontal:'center'},border:FULL_BORDER}},
            {v:room.capacity,t:'n',s:{alignment:{horizontal:'center'},border:FULL_BORDER}},
            {v:used,t:'n',s:{alignment:{horizontal:'center'},border:FULL_BORDER}},
            {v:tot-used,t:'n',s:{alignment:{horizontal:'center'},border:FULL_BORDER}},
            {v:utilPct+'%',t:'s',s:{font:{bold:true},fill:{patternType:'solid',fgColor:{rgb:utilFill}},alignment:{horizontal:'center'},border:FULL_BORDER}}
          ]);

          const ws       = buildSheet(re, room.name, deptName);
          const sheetName = room.name.replace(/[\\\/\?\*\[\]:]/g,'').slice(0,31);
          XLSX.utils.book_append_sheet(wb, ws, sheetName);
        }

        const wsSumm = XLSX.utils.aoa_to_sheet(summRows);
        wsSumm['!cols'] = [{wch:22},{wch:12},{wch:10},{wch:14},{wch:14},{wch:14}];
        wsSumm['!rows'] = [{hpt:22},{hpt:18},{hpt:8},{hpt:20},...allRooms.map(()=>({hpt:18}))];
        wsSumm['!merges'] = [{s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}},{s:{r:2,c:0},e:{r:2,c:5}}];
        wb.SheetNames.unshift('Summary');
        wb.Sheets['Summary'] = wsSumm;

        XLSX.writeFile(wb, `All_Rooms_${deptName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
      } finally {
        btn.textContent = '📥 All Rooms'; btn.disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
