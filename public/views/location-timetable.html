<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Timetable — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="header no-print">
    <div class="logo">🎓 <span id="headerDept">JIET Universe — Department of Technology</span></div>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/views/class-timetable.html">Class</a>
      <a href="/views/faculty-timetable.html">Faculty</a>
      <a href="/views/location-timetable.html" class="active">Location</a>
      <a href="/admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-title">Location / Room Timetable</div>

    <div class="card no-print">
      <div class="filter-bar">
        <div class="form-group" style="min-width:240px;">
          <label>Select Room / Location</label>
          <select id="roomSelect" class="form-control" onchange="loadTimetable()">
            <option value="">Select Room</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadTimetable()">View</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
        <button class="btn btn-outline" onclick="exportExcel()" id="excelBtn" style="display:none;">📥 Export Excel</button>
        <button class="btn btn-outline" onclick="exportAllRooms()" id="exportAllBtn" style="display:none;">📥 Export All Rooms</button>
      </div>
    </div>

    <div id="timetableArea" style="display:none;">
      <div class="card">
        <div class="card-title" id="tableTitle"></div>
        <div class="print-header" style="text-align:center;margin-bottom:12px;display:none;">
          <h2 style="color:#1a237e;" id="printDeptName">Department of Technology</h2>
          <h3 id="printTitle"></h3>
          <p style="color:#666;">Room Allocation Schedule</p>
        </div>
        <div class="timetable-grid">
          <table class="timetable-table" id="timetableTable"></table>
        </div>
        <div id="summaryArea" style="margin-top:16px;"></div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🏫</div>
      <p>Select a room or location to view its schedule</p>
    </div>
  </div>

  <script>
    fetch('/api/settings').then(r => r.json()).then(s => {
      const dept = s.department_name || 'Department of Technology';
      const college = s.college_name || 'JIET Universe';
      document.getElementById('headerDept').textContent = `${college} — ${dept}`;
      document.querySelectorAll('.print-header h3').forEach(el => el.textContent = dept);
    }).catch(() => {});

    const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const COLORS = ['color-0','color-1','color-2','color-3','color-4','color-5','color-6','color-7','color-8','color-9','color-10','color-11'];
    const sectionColorMap = {};
    let slots = [], entries = [], allRooms = [];
    let currentRoomName = 'Room';
    let deptId = localStorage.getItem('selectedDepartmentId') || '1';

    function getSectionColor(sectionId) {
      if (!sectionColorMap[sectionId]) {
        sectionColorMap[sectionId] = COLORS[Object.keys(sectionColorMap).length % COLORS.length];
      }
      return sectionColorMap[sectionId];
    }

    async function init() {
      fetch('/api/auth/status').then(r => r.json()).then(d => {
        if (d.loggedIn) {
          document.getElementById('adminLink').style.display = 'inline';
          if (!d.user.isSuperAdmin && d.user.department_id) deptId = d.user.department_id;
        }
        // Show export-all button for logged-in users
        if (d.loggedIn) document.getElementById('exportAllBtn').style.display = 'inline-flex';
      });

      const [rRes, slRes] = await Promise.all([
        fetch(`/api/rooms?department_id=${deptId}`),
        fetch(`/api/timeslots?department_id=${deptId}`)
      ]);
      allRooms = await rRes.json();
      slots    = await slRes.json();

      const sel   = document.getElementById('roomSelect');
      const types = [...new Set(allRooms.map(r => r.type))];
      types.forEach(type => {
        const group = document.createElement('optgroup');
        group.label = type.charAt(0).toUpperCase() + type.slice(1) + 's';
        allRooms.filter(r => r.type === type).forEach(r => {
          const opt   = document.createElement('option');
          opt.value   = r.id;
          opt.textContent = `${r.name} (cap: ${r.capacity})`;
          group.appendChild(opt);
        });
        sel.appendChild(group);
      });

      const params = new URLSearchParams(location.search);
      if (params.get('room_id')) {
        sel.value = params.get('room_id');
        await loadTimetable();
      }
    }

    async function loadTimetable() {
      const roomId = document.getElementById('roomSelect').value;
      if (!roomId) return;

      const res = await fetch(`/api/timetable/location?room_id=${roomId}`);
      entries = await res.json();

      currentRoomName = document.getElementById('roomSelect').options[document.getElementById('roomSelect').selectedIndex].text;
      document.getElementById('tableTitle').textContent = `${currentRoomName} — Weekly Schedule`;
      document.getElementById('printTitle').textContent = currentRoomName;

      renderTable();
      renderSummary();
      document.getElementById('timetableArea').style.display = 'block';
      document.getElementById('emptyState').style.display   = 'none';
      document.getElementById('excelBtn').style.display     = 'inline-flex';
    }

    function renderTable() {
      const table = document.getElementById('timetableTable');
      let html = '<thead><tr><th class="day-header">Day / Time</th>';
      slots.forEach(s => {
        if (s.is_break) {
          html += `<th class="slot-header" style="background:#f57c00;">LUNCH<br><small>${s.start_time}–${s.end_time}</small></th>`;
        } else {
          html += `<th class="slot-header">Slot ${s.slot_number}<br><small>${s.start_time}–${s.end_time}</small></th>`;
        }
      });
      html += '</tr></thead><tbody>';
      DAYS.forEach(day => {
        html += `<tr><td class="day-cell">${day}</td>`;
        slots.forEach(slot => {
          if (slot.is_break) { html += `<td class="break-cell">🍽️ LUNCH</td>`; return; }
          const entry = entries.find(e => e.day_of_week === day && e.time_slot_id === slot.id);
          if (entry && entry.subject_id) {
            const color = getSectionColor(entry.section_id);
            const isBtu = entry.subject_category === 'btu';
            const isLab = entry.subject_type === 'lab';
            const badge = isBtu
              ? `<span style="font-size:0.6rem;background:rgba(230,81,0,0.2);color:#e65100;border-radius:2px;padding:0 3px;margin-left:2px;vertical-align:middle;">BTU</span>`
              : isLab
              ? `<span style="font-size:0.6rem;background:rgba(0,0,0,0.13);border-radius:2px;padding:0 3px;margin-left:2px;vertical-align:middle;">LAB</span>`
              : '';
            html += `<td><div class="timetable-cell ${color}${isBtu ? ' btu-cell' : ''}">
              <div class="cell-subject">${entry.subject_name || '?'}${badge}</div>
              <div class="cell-faculty">${entry.faculty_name || ''}</div>
              <div class="cell-room" style="font-weight:600;">${entry.year_name || ''} - Sec ${entry.section_name || ''}</div>
            </div></td>`;
          } else {
            html += `<td><div class="timetable-cell nlf-cell">NLF</div></td>`;
          }
        });
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;
    }

    function renderSummary() {
      const totalPeriods   = entries.filter(e => e.subject_id).length;
      const totalSlots     = slots.filter(s => !s.is_break).length * 6;
      const utilization    = Math.round((totalPeriods / totalSlots) * 100);
      const uniqueSections = [...new Set(entries.filter(e => e.section_id).map(e => `${e.year_name} Sec ${e.section_name}`))];
      document.getElementById('summaryArea').innerHTML = `
        <div style="display:flex;gap:16px;flex-wrap:wrap;" class="no-print">
          <div style="background:#e8eaf6;padding:12px 20px;border-radius:8px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:700;color:#1a237e;">${totalPeriods}</div>
            <div style="font-size:0.78rem;color:#666;">Periods Used/Week</div>
          </div>
          <div style="background:#e8f5e9;padding:12px 20px;border-radius:8px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:700;color:#2e7d32;">${utilization}%</div>
            <div style="font-size:0.78rem;color:#666;">Utilization</div>
          </div>
          <div style="background:#fff3e0;padding:12px 20px;border-radius:8px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:700;color:#e65100;">${totalSlots - totalPeriods}</div>
            <div style="font-size:0.78rem;color:#666;">Free Periods</div>
          </div>
        </div>
        ${uniqueSections.length > 0 ? `<p style="margin-top:12px;font-size:0.85rem;color:#555;" class="no-print"><strong>Used by:</strong> ${uniqueSections.join(', ')}</p>` : ''}`;
    }

    // ── Excel Export: Single Room ─────────────────────────────────────────────
    function exportExcel() {
      const wb = XLSX.utils.book_new();
      const teachingSlots = slots.filter(s => !s.is_break);
      const deptName = document.getElementById('headerDept').textContent;

      const headerRow = ['Day / Time', ...teachingSlots.map(s => `${s.start_time}–${s.end_time}`)];
      const dataRows  = DAYS.map(day => {
        const row = [day];
        teachingSlots.forEach(slot => {
          const entry = entries.find(e => e.day_of_week === day && e.time_slot_id === slot.id);
          if (entry && entry.subject_id) {
            const typeTag = entry.subject_category === 'btu'
              ? ` [BTU-${entry.subject_type==='lab'?'LAB':'THEORY'}]`
              : entry.subject_type === 'lab' ? ' [LAB]' : '';
            row.push(`${entry.subject_name}${typeTag}\n${entry.faculty_name||''}\n${entry.year_name||''} Sec ${entry.section_name||''}`);
          } else {
            row.push('NLF');
          }
        });
        return row;
      });
      const wsData = [
        [deptName], [currentRoomName], ['Room Allocation Schedule'], [],
        headerRow, ...dataRows
      ];
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const totalCols = teachingSlots.length + 1;
      ws['!cols'] = [{ wch: 12 }, ...teachingSlots.map(() => ({ wch: 22 }))];
      ws['!merges'] = [
        { s:{r:0,c:0}, e:{r:0,c:totalCols-1} },
        { s:{r:1,c:0}, e:{r:1,c:totalCols-1} },
        { s:{r:2,c:0}, e:{r:2,c:totalCols-1} },
      ];
      XLSX.utils.book_append_sheet(wb, ws, currentRoomName.split('(')[0].trim().slice(0,31));
      XLSX.writeFile(wb, `Room_${currentRoomName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // ── Excel Export: All Rooms in one workbook ───────────────────────────────
    async function exportAllRooms() {
      const btn = document.getElementById('exportAllBtn');
      btn.textContent = '⏳ Generating...';
      btn.disabled = true;

      try {
        const wb = XLSX.utils.book_new();
        const teachingSlots = slots.filter(s => !s.is_break);
        const deptName = document.getElementById('headerDept').textContent;
        const summaryRows = [['Room', 'Type', 'Capacity', 'Periods Used', 'Free Periods', 'Utilization %']];

        for (const room of allRooms) {
          const res       = await fetch(`/api/timetable/location?room_id=${room.id}`);
          const roomEntries = await res.json();

          const headerRow = ['Day / Time', ...teachingSlots.map(s => `${s.start_time}–${s.end_time}`)];
          const dataRows  = DAYS.map(day => {
            const row = [day];
            teachingSlots.forEach(slot => {
              const entry = roomEntries.find(e => e.day_of_week === day && e.time_slot_id === slot.id);
              if (entry && entry.subject_id) {
                const typeTag = entry.subject_category === 'btu'
                  ? ` [BTU-${entry.subject_type==='lab'?'LAB':'THEORY'}]`
                  : entry.subject_type === 'lab' ? ' [LAB]' : '';
                row.push(`${entry.subject_name}${typeTag}\n${entry.faculty_name||''}\n${entry.year_name||''} Sec ${entry.section_name||''}`);
              } else {
                row.push('NLF');
              }
            });
            return row;
          });

          const used = roomEntries.filter(e => e.subject_id).length;
          const total = teachingSlots.length * 6;
          summaryRows.push([room.name, room.type, room.capacity, used, total - used, Math.round((used/total)*100) + '%']);

          const wsData = [[deptName], [room.name], ['Room Allocation Schedule'], [], headerRow, ...dataRows];
          const ws = XLSX.utils.aoa_to_sheet(wsData);
          const totalCols = teachingSlots.length + 1;
          ws['!cols'] = [{ wch: 12 }, ...teachingSlots.map(() => ({ wch: 22 }))];
          ws['!merges'] = [
            { s:{r:0,c:0}, e:{r:0,c:totalCols-1} },
            { s:{r:1,c:0}, e:{r:1,c:totalCols-1} },
            { s:{r:2,c:0}, e:{r:2,c:totalCols-1} },
          ];
          // Sheet name max 31 chars
          const sheetName = room.name.replace(/[\\\/\?\*\[\]:]/g,'').slice(0, 31);
          XLSX.utils.book_append_sheet(wb, ws, sheetName);
        }

        // Summary sheet first
        const wsSummary = XLSX.utils.aoa_to_sheet([[deptName], ['Room Utilization Summary'], [], ...summaryRows]);
        wsSummary['!cols'] = [20,12,10,14,14,14].map(wch => ({ wch }));
        wsSummary['!merges'] = [
          { s:{r:0,c:0}, e:{r:0,c:5} },
          { s:{r:1,c:0}, e:{r:1,c:5} },
        ];
        wb.SheetNames.unshift('Summary');
        wb.Sheets['Summary'] = wsSummary;

        XLSX.writeFile(wb, `All_Rooms_${deptName.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
      } finally {
        btn.textContent = '📥 Export All Rooms';
        btn.disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
