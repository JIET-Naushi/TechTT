<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JIET Universe Timetable</title>
  <link rel="stylesheet" href="/css/style.css">
  <meta name="google-signin-client_id" content="4607775138-oe3dqf7g34lb1uevvnijfli5n6t9lm7a.apps.googleusercontent.com">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
  <div class="login-card" style="max-width:440px;">
    <div class="login-logo">
      <div style="font-size:2.8rem;">🎓</div>
      <h2 style="font-size:1.4rem;">JIET Universe Timetable</h2>
      <p id="deptSubtitle" style="color:#555;font-size:0.88rem;">Loading...</p>
    </div>

    <div id="alertBox"></div>

    <!-- Google Sign-In Button -->
    <div style="margin-bottom:20px;">
      <p style="text-align:center;font-size:0.82rem;color:#888;margin-bottom:12px;">Sign in with your Google account</p>
      <div id="g_id_onload"
           data-client_id="4607775138-oe3dqf7g34lb1uevvnijfli5n6t9lm7a.apps.googleusercontent.com"
           data-callback="handleGoogleLogin"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="rectangular"
           data-logo_alignment="left"
           data-width="360">
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <hr style="flex:1;border:none;border-top:1px solid #ddd;">
      <span style="font-size:0.78rem;color:#aaa;">or use password</span>
      <hr style="flex:1;border:none;border-top:1px solid #ddd;">
    </div>

    <!-- Fallback password login -->
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">
        Login
      </button>
    </form>

    <div style="text-align:center;margin-top:16px;">
      <a href="/index.html" style="color:#666;font-size:0.85rem;">← Back to Home</a>
    </div>
  </div>

  <script>
    // Load department name
    fetch('/api/settings').then(r => r.json()).then(s => {
      document.getElementById('deptSubtitle').textContent =
        (s.department_name || 'Department of Technology') + ' — Admin Login';
    }).catch(err => {
      console.error('Failed to load settings:', err);
      document.getElementById('deptSubtitle').textContent = 'Department of Technology — Admin Login';
    });

    // If already logged in, redirect
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.loggedIn) location.href = '/admin/dashboard.html';
    });

    // Google Sign-In callback
    async function handleGoogleLogin(response) {
      showAlert('Signing in...', 'info');
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (data.success) {
          location.href = '/admin/dashboard.html';
        } else {
          showAlert(data.message || 'Google login failed', 'error');
        }
      } catch (err) {
        showAlert('Server error. Please try again.', 'error');
      }
    }

    // Password login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="spinner"></span> Logging in...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          location.href = '/admin/dashboard.html';
        } else {
          showAlert(data.message || 'Login failed', 'error');
          btn.innerHTML = 'Login';
          btn.disabled = false;
        }
      } catch (err) {
        showAlert('Server error. Please try again.', 'error');
        btn.innerHTML = 'Login';
        btn.disabled = false;
      }
    });

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
