<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Timetable System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:2.5rem;">🎓</div>
      <h2>Timetable System</h2>
      <p>Department of Technology — Admin Login</p>
    </div>
    <div id="alertBox"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" value="admin" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" value="admin123" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" id="loginBtn">
        Login
      </button>
    </form>
    <div style="text-align:center;margin-top:16px;">
      <a href="/index.html" style="color:#666;font-size:0.85rem;">← Back to Home</a>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.loggedIn) location.href = '/admin/dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="spinner"></span> Logging in...';
      btn.disabled = true;

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          location.href = '/admin/dashboard.html';
        } else {
          showAlert(data.message || 'Login failed', 'error');
          btn.innerHTML = 'Login';
          btn.disabled = false;
        }
      } catch (err) {
        showAlert('Server error. Please try again.', 'error');
        btn.innerHTML = 'Login';
        btn.disabled = false;
      }
    });

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
